<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FAMILYNK — Gastos</title>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --sage: #7A9E7E; --cream: #FDF8F3; --cream-dark: #F5EDE4; --cream-medium: #FAF5EF;
      --terracotta: #C17757; --text: #3D3D3D; --text-light: #6B6B6B; --text-muted: #9A9A9A; --white: #FFFFFF;
      --mayordomo: #8B7355; --mayordomo-light: #A69076; --mayordomo-dark: #6B5A42; --mayordomo-muted: rgba(139,115,85,0.15);
      --addon-color: var(--mayordomo); --addon-light: var(--mayordomo-light);
      --addon-dark: var(--mayordomo-dark); --addon-muted: var(--mayordomo-muted);
      --success: #7DB59A; --success-muted: rgba(125,181,154,0.15);
      --warning: #E8B44D; --warning-muted: rgba(232,180,77,0.15);
      --error: #D4695A; --error-muted: rgba(212,105,90,0.15);
      --shadow-soft: 0 2px 8px rgba(0,0,0,0.06); --shadow-medium: 0 4px 16px rgba(0,0,0,0.08);
      --radius-sm: 8px; --radius-md: 12px; --radius-lg: 16px; --radius-full: 50px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Nunito', sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; }

    .header {
      background: linear-gradient(135deg, var(--addon-color) 0%, var(--addon-dark) 100%);
      padding: 16px 24px; display: flex; align-items: center; justify-content: space-between;
      box-shadow: var(--shadow-medium); position: sticky; top: 0; z-index: 100;
    }
    .header a, .header span { color: white; text-decoration: none; font-family: 'Quicksand'; font-weight: 600; font-size: 0.9rem; }
    .header-title { font-family: 'Quicksand'; font-weight: 700; font-size: 1.1rem; color: white; }
    .header-bien { font-size: 0.8rem; color: rgba(255,255,255,0.75); }

    .container { max-width: 900px; margin: 0 auto; padding: 20px; }

    /* Summary cards */
    .summary-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
    .summary-card { background: var(--white); border-radius: var(--radius-md); padding: 16px; text-align: center; box-shadow: var(--shadow-soft); }
    .summary-num { font-family: 'Quicksand'; font-weight: 700; font-size: 1.5rem; color: var(--addon-color); }
    .summary-label { font-size: 0.78rem; color: var(--text-muted); }

    /* Filtros */
    .filtros { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
    .filtros select { flex: 1; min-width: 120px; font-size: 0.82rem; padding: 8px 10px; border: 1px solid var(--cream-dark); border-radius: var(--radius-sm); background: var(--white); font-family: 'Nunito'; }

    /* Lista */
    .lista-gastos { display: flex; flex-direction: column; gap: 2px; }
    .gasto-item {
      display: flex; align-items: center; gap: 12px; padding: 12px 14px;
      background: var(--white); border-radius: var(--radius-sm); cursor: pointer;
      border-left: 3px solid var(--terracotta); transition: transform 0.15s;
    }
    .gasto-item:hover { transform: translateX(4px); }
    .gasto-fecha { font-size: 0.75rem; color: var(--text-muted); min-width: 70px; font-family: 'Quicksand'; font-weight: 600; }
    .gasto-concepto { flex: 1; font-size: 0.88rem; }
    .gasto-detalle { font-size: 0.7rem; color: var(--text-muted); }
    .gasto-importe { font-family: 'Quicksand'; font-weight: 700; font-size: 0.92rem; white-space: nowrap; }
    .gasto-mes-header {
      display: flex; justify-content: space-between; padding: 8px 12px;
      background: var(--cream-medium); border-radius: var(--radius-sm); margin-bottom: 6px;
    }
    .gasto-mes-header span { font-weight: 700; font-size: 0.88rem; }
    .total-bar {
      display: flex; justify-content: space-between; padding: 12px;
      background: var(--addon-color); color: white; border-radius: var(--radius-sm); font-weight: 700;
      margin-top: 12px;
    }

    .empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); }
    .empty-state div:first-child { font-size: 2.5rem; margin-bottom: 8px; }

    /* FAB */
    .fab {
      position: fixed; bottom: 24px; right: 24px; width: 56px; height: 56px;
      background: var(--addon-color); color: white; border: none; border-radius: 50%;
      font-size: 1.8rem; cursor: pointer; box-shadow: var(--shadow-medium);
      display: flex; align-items: center; justify-content: center; z-index: 90;
    }
    .fab:hover { background: var(--addon-dark); transform: scale(1.05); }

    /* Modal */
    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      z-index: 200; align-items: center; justify-content: center; padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--white); border-radius: var(--radius-lg); width: 100%; max-width: 520px;
      max-height: 90vh; display: flex; flex-direction: column; box-shadow: 0 16px 48px rgba(0,0,0,0.15);
    }
    .modal-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 20px; border-bottom: 1px solid var(--cream-dark);
    }
    .modal-title { font-family: 'Quicksand'; font-weight: 700; font-size: 1rem; }
    .modal-close { background: none; border: none; font-size: 1.3rem; cursor: pointer; color: var(--text-muted); padding: 4px; }
    .modal-body { padding: 20px; overflow-y: auto; }
    .modal-footer { padding: 12px 20px; border-top: 1px solid var(--cream-dark); display: flex; justify-content: flex-end; gap: 8px; }

    .form-group { margin-bottom: 14px; }
    .form-label { display: block; font-size: 0.82rem; font-weight: 600; margin-bottom: 4px; color: var(--text-light); }
    .form-input, .form-select, .form-textarea {
      width: 100%; padding: 10px 12px; border: 1px solid var(--cream-dark); border-radius: var(--radius-sm);
      font-family: 'Nunito'; font-size: 0.9rem; background: var(--cream-medium);
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: var(--addon-color); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .subgrupo-input-wrap { display: flex; align-items: center; gap: 8px; }
    .subgrupo-input-wrap .form-group { flex: 1; margin-bottom: 0; }
    .subgrupo-toggle { font-size: 0.78rem; color: var(--addon-color); cursor: pointer; white-space: nowrap; font-weight: 600; }

    .btn { padding: 10px 20px; border: none; border-radius: var(--radius-sm); font-family: 'Nunito'; font-weight: 600; font-size: 0.88rem; cursor: pointer; }
    .btn-addon { background: var(--addon-color); color: white; }
    .btn-addon:hover { background: var(--addon-dark); }
    .btn-secondary { background: var(--cream-dark); color: var(--text); }
    .btn-danger { background: var(--error); color: white; font-size: 0.8rem; padding: 8px 14px; }

    @media (max-width: 600px) {
      .summary-row { grid-template-columns: 1fr; }
      .form-row { grid-template-columns: 1fr; }
      .filtros { flex-direction: column; }
    }

    .btn-pdf {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 14px; background: white; color: #5C7D5F;
      border: 2px solid #7A9E7E; border-radius: 8px;
      font-family: 'Nunito', sans-serif; font-size: 0.82rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s; text-decoration: none;
    }
    .btn-pdf:hover { background: #7A9E7E; color: white; }

    /* Tabs Registro/Reparto */
    .gastos-tabs {
      display: flex; gap: 0; margin-bottom: 20px; border-bottom: 2px solid var(--cream-dark);
    }
    .gastos-tab {
      flex: 1; text-align: center; padding: 10px; font-family: 'Quicksand'; font-weight: 700;
      font-size: 0.9rem; color: var(--text-muted); cursor: pointer; border-bottom: 3px solid transparent;
      transition: all 0.2s; background: none; border-top: none; border-left: none; border-right: none;
    }
    .gastos-tab:hover { color: var(--text); }
    .gastos-tab.active { color: var(--addon-color); border-bottom-color: var(--addon-color); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Reparto / Liquidaciones */
    .btn-nueva-liq {
      display: block; width: 100%; padding: 14px; margin-top: 12px;
      background: var(--white); border: 2px dashed var(--addon-color); border-radius: var(--radius-md);
      font-family: 'Quicksand'; font-weight: 700; font-size: 0.9rem; color: var(--addon-color);
      cursor: pointer; transition: all 0.2s;
    }
    .btn-nueva-liq:hover { background: var(--addon-muted); }
    .btn-mini {
      padding: 4px 10px; border: 1px solid var(--cream-dark); border-radius: 4px;
      background: var(--white); font-family: 'Nunito'; font-size: 0.72rem; cursor: pointer;
    }
    .btn-mini:hover { background: var(--cream-dark); }
    .liq-gastos-lista {
      max-height: 200px; overflow-y: auto; border: 1px solid var(--cream-dark);
      border-radius: var(--radius-sm); background: var(--white);
    }
    .liq-gasto-row {
      display: flex; align-items: center; gap: 8px; padding: 8px 10px;
      border-bottom: 1px solid var(--cream-dark); font-size: 0.82rem; cursor: pointer;
    }
    .liq-gasto-row:last-child { border-bottom: none; }
    .liq-gasto-row:hover { background: var(--cream-medium); }
    .liq-gasto-row.disabled { opacity: 0.4; pointer-events: none; }
    .liq-gasto-row input[type=checkbox] { accent-color: var(--addon-color); flex-shrink: 0; }
    .liq-gasto-concepto { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .liq-gasto-importe { font-family: 'Quicksand'; font-weight: 700; font-size: 0.82rem; white-space: nowrap; }
    .liq-gasto-badge { font-size: 0.65rem; padding: 1px 6px; background: var(--warning-muted); color: var(--warning); border-radius: 3px; white-space: nowrap; }

    .liq-nido-row {
      display: flex; align-items: center; gap: 10px; padding: 10px 0;
      border-bottom: 1px solid var(--cream-dark);
    }
    .liq-nido-row:last-child { border-bottom: none; }
    .liq-nido-check { accent-color: var(--addon-color); }
    .liq-nido-nombre { flex: 1; font-weight: 600; font-size: 0.88rem; }
    .liq-nido-pct { width: 60px; padding: 6px; border: 1.5px solid var(--cream-dark); border-radius: 6px; text-align: right; font-family: 'Nunito'; font-size: 0.85rem; }
    .liq-nido-pct:focus { outline: none; border-color: var(--addon-color); }
    .liq-nido-pct:disabled { background: var(--cream-dark); color: var(--text-muted); }
    .liq-nido-importe { min-width: 80px; text-align: right; font-family: 'Quicksand'; font-weight: 700; font-size: 0.85rem; color: var(--addon-dark); }

    .reparto-total-bar { display: flex; justify-content: space-between; padding: 10px 0; margin-top: 6px; border-top: 2px solid var(--cream-dark); font-weight: 700; font-size: 0.88rem; }
    .reparto-total-bar.ok .reparto-total-valor { color: var(--success); }
    .reparto-total-bar.error .reparto-total-valor { color: var(--error); }

    .liq-preview { margin-top: 12px; padding: 12px; background: var(--cream-medium); border-radius: var(--radius-sm); }
    .liq-preview-title { font-family: 'Quicksand'; font-weight: 700; font-size: 0.82rem; color: var(--addon-dark); margin-bottom: 8px; }
    .liq-preview-row { display: flex; justify-content: space-between; font-size: 0.82rem; padding: 4px 0; }

    /* Historial de liquidaciones */
    .liq-card {
      background: var(--white); border-radius: var(--radius-md); padding: 16px;
      box-shadow: var(--shadow-soft); margin-bottom: 12px; cursor: pointer; transition: transform 0.15s;
    }
    .liq-card:hover { transform: translateX(4px); }
    .liq-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .liq-card-nombre { font-family: 'Quicksand'; font-weight: 700; font-size: 0.95rem; }
    .liq-card-total { font-family: 'Quicksand'; font-weight: 700; font-size: 1rem; color: var(--addon-color); }
    .liq-card-meta { font-size: 0.75rem; color: var(--text-muted); }
    .liq-card-nidos { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .liq-card-nido { padding: 3px 10px; background: var(--addon-muted); border-radius: var(--radius-full); font-size: 0.75rem; font-weight: 600; }
    .liq-empty { text-align: center; padding: 40px 20px; color: var(--text-muted); }
    .liq-empty-icon { font-size: 2.5rem; opacity: 0.3; margin-bottom: 8px; }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <a id="btn-volver" href="#">← Volver</a>
    <div style="text-align:center;">
      <div class="header-title">💶 Gastos</div>
      <div class="header-bien" id="bien-nombre">Cargando...</div>
    </div>
    <button class="btn-pdf" onclick="generarPDF()">📄 PDF</button>
  </div>

  <div class="container">
    <!-- Summary -->
    <div class="summary-row" id="summary-row">
      <div class="summary-card"><div class="summary-num" id="sum-total">—</div><div class="summary-label">Total gastado</div></div>
      <div class="summary-card"><div class="summary-num" id="sum-count">—</div><div class="summary-label">Registros</div></div>
      <div class="summary-card"><div class="summary-num" id="sum-media">—</div><div class="summary-label">Media / gasto</div></div>
    </div>

    <!-- Tabs -->
    <div class="gastos-tabs">
      <button class="gastos-tab active" onclick="cambiarTab('registro')">💶 Registro</button>
      <button class="gastos-tab" onclick="cambiarTab('reparto')">📊 Reparto</button>
    </div>

    <!-- TAB: Registro -->
    <div class="tab-content active" id="tab-registro">
    <!-- Filtros -->
    <div class="filtros">
      <select id="filtro-cat" onchange="renderLista()">
        <option value="">📁 Todas las categorías</option>
      </select>
      <select id="filtro-medio" onchange="renderLista()">
        <option value="">💳 Todos los medios</option>
        <option value="efectivo">💵 Efectivo</option>
        <option value="transferencia">🏦 Transferencia</option>
        <option value="tarjeta">💳 Tarjeta</option>
        <option value="domiciliacion">📋 Domiciliación</option>
      </select>
      <select id="filtro-anotador" onchange="renderLista()">
        <option value="">👤 Todos los que apuntan</option>
      </select>
    </div>

    <!-- Lista -->
    <div class="lista-gastos" id="lista-gastos"></div>
    <div class="empty-state" id="empty-state" style="display:none;">
      <div>💶</div>
      <div style="font-weight:600;">Sin gastos registrados</div>
      <div style="font-size:0.85rem;">Pulsa + para añadir el primer gasto</div>
    </div>
    </div>

    <!-- TAB: Reparto -->
    <div class="tab-content" id="tab-reparto">
      <!-- Historial de liquidaciones -->
      <div id="liquidaciones-historial"></div>

      <!-- Botón nueva liquidación -->
      <button class="btn-nueva-liq" onclick="abrirModalLiquidacion()">+ Nueva liquidación</button>
    </div>
  </div>

  <!-- Modal Liquidación -->
  <div class="modal-overlay" id="modal-liquidacion" onclick="if(event.target===this)cerrarModalLiq()">
    <div class="modal" style="max-width:620px;max-height:90vh;display:flex;flex-direction:column;">
      <div class="modal-header">
        <span class="modal-title" id="liq-modal-titulo">📊 Nueva liquidación</span>
        <button class="modal-close" onclick="cerrarModalLiq()">×</button>
      </div>
      <div class="modal-body" style="overflow-y:auto;flex:1;">
        <!-- Paso 1: Nombre -->
        <div class="form-group">
          <label class="form-label">Nombre de la liquidación *</label>
          <input type="text" class="form-input" id="liq-nombre" placeholder="Ej: Liquidación Q1 2026, Gastos Navidad...">
        </div>

        <!-- Paso 2: Seleccionar gastos -->
        <div class="form-group">
          <label class="form-label">Seleccionar gastos a repartir</label>
          <div style="display:flex;gap:8px;margin-bottom:8px;">
            <button type="button" class="btn-mini" onclick="liqSeleccionarTodos()">Todos</button>
            <button type="button" class="btn-mini" onclick="liqDeseleccionarTodos()">Ninguno</button>
            <span style="flex:1;"></span>
            <span style="font-size:0.78rem;color:var(--text-muted);" id="liq-gastos-count">0 seleccionados · €0.00</span>
          </div>
          <div class="liq-gastos-lista" id="liq-gastos-lista"></div>
        </div>

        <!-- Paso 3: Nidos y porcentajes -->
        <div class="form-group">
          <label class="form-label">Reparto entre nidos</label>
          <div id="liq-nidos-lista"></div>
          <div class="reparto-total-bar" id="liq-total-bar">
            <span>Total</span>
            <span class="reparto-total-valor" id="liq-total-pct">0%</span>
          </div>
        </div>

        <!-- Paso 4: Cuenta bancaria -->
        <div class="form-group">
          <label class="form-label">Cuenta para ingresos (IBAN)</label>
          <input type="text" class="form-input" id="liq-iban" placeholder="ES00 0000 0000 0000 0000 0000" style="font-family:monospace;letter-spacing:1px;">
          <div style="font-size:0.72rem;color:var(--text-muted);margin-top:4px;">Cuenta donde cada nido debe ingresar su parte</div>
        </div>

        <!-- Desglose preview -->
        <div id="liq-desglose-preview"></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" onclick="cerrarModalLiq()">Cancelar</button>
        <button type="button" class="btn btn-addon" onclick="guardarLiquidacion()">💾 Guardar liquidación</button>
      </div>
    </div>
  </div>

  <!-- FAB -->
  <button class="fab" onclick="abrirModal()">+</button>

  <!-- Modal -->
  <div class="modal-overlay" id="modal-gasto">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="modal-title">💶 Nuevo gasto</span>
        <button class="modal-close" onclick="cerrarModal()">×</button>
      </div>
      <div class="modal-body">
        <div class="form-group"><label class="form-label">Fecha *</label><input type="date" class="form-input" id="g-fecha"></div>
        <div class="form-group"><label class="form-label">Concepto *</label><input type="text" class="form-input" id="g-concepto" placeholder="Ej: Factura de luz, Reparación puerta..."></div>
        <div class="form-group">
          <label class="form-label">Categoría *</label>
          <select class="form-select" id="g-categoria">
            <option value="">— Selecciona —</option>
            <option value="suministros">💡 Suministros (luz, agua, gas)</option>
            <option value="limpieza">🧹 Limpieza</option>
            <option value="mantenimiento">🔧 Mantenimiento</option>
            <option value="alimentacion">🛒 Alimentación</option>
            <option value="seguros">🛡️ Seguros</option>
            <option value="personal">👷 Personal</option>
            <option value="jardineria">🌿 Jardinería</option>
            <option value="comunidad">🏢 Comunidad</option>
            <option value="impuestos">📋 Impuestos / tasas</option>
            <option value="otros">📦 Otros</option>
          </select>
        </div>
        <div class="form-group"><label class="form-label">Importe (€) *</label><input type="number" class="form-input" id="g-importe" min="0" step="0.01" placeholder="0.00"></div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Medio de pago</label>
            <select class="form-select" id="g-medio">
              <option value="">— Sin especificar —</option>
              <option value="efectivo">💵 Efectivo</option>
              <option value="transferencia">🏦 Transferencia</option>
              <option value="tarjeta">💳 Tarjeta</option>
              <option value="domiciliacion">📋 Domiciliación</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Cuenta</label>
            <div class="subgrupo-input-wrap">
              <div class="form-group">
                <select class="form-select" id="g-cuenta">
                  <option value="">— Sin especificar —</option>
                </select>
              </div>
              <span class="subgrupo-toggle" onclick="toggleNuevaCuenta()">+ Nueva</span>
            </div>
            <input type="text" class="form-input" id="g-cuenta-new" placeholder="Ej: CaixaBank, Caja chica..." style="display:none;margin-top:6px;">
          </div>
        </div>
        <div class="form-group"><label class="form-label">Nota</label><textarea class="form-textarea" id="g-notas" rows="2" placeholder="Observaciones..."></textarea></div>
        <div class="form-group">
          <label class="form-label">Quién anota</label>
          <div class="subgrupo-input-wrap">
            <div class="form-group">
              <select class="form-select" id="g-anotador">
                <option value="">— Yo mismo —</option>
              </select>
            </div>
            <span class="subgrupo-toggle" onclick="toggleNuevoAnotador()">+ Otro</span>
          </div>
          <input type="text" class="form-input" id="g-anotador-new" placeholder="Ej: Casero, Guarda..." style="display:none;margin-top:6px;">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="cerrarModal()">Cancelar</button>
        <button class="btn btn-danger" id="btn-eliminar" onclick="eliminarGasto()" style="display:none;">Eliminar</button>
        <button class="btn btn-addon" onclick="guardarGasto()">Guardar</button>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="permisos-familia.js"></script>
  <script>
    let bienId = null, bienData = null, currentUser = null;
    let gastos = [];
    let externosNombres = [];
    let editandoId = null;
    let nidosData = [];
    let liquidaciones = [];
    const NIDO_COLORS = ['#7A9E7E', '#C17757', '#5B8BA0', '#B8A07E', '#8B6F8E', '#6BA39B'];

    const CAT_LABELS = {
      suministros: '💡 Suministros', limpieza: '🧹 Limpieza', mantenimiento: '🔧 Mantenimiento',
      alimentacion: '🛒 Alimentación', seguros: '🛡️ Seguros', personal: '👷 Personal',
      jardineria: '🌿 Jardinería', comunidad: '🏢 Comunidad', impuestos: '📋 Impuestos',
      otros: '📦 Otros'
    };
    const MEDIO_ICONS = { efectivo: '💵', transferencia: '🏦', tarjeta: '💳', domiciliacion: '📋' };

    // ===== INIT =====
    document.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      bienId = params.get('id');
      if (!bienId) { alert('No se ha especificado el bien'); window.location.href = 'lo-comun.html'; return; }

      document.getElementById('btn-volver').href = `bien.html?id=${bienId}`;

      auth.onAuthStateChanged(async (user) => {
        if (user) {
          currentUser = user;
          await cargarBien();

          // Permisos de familia
          try {
            if (typeof PermisosFamilia !== 'undefined') {
              await PermisosFamilia.init(db, user, bienId);
              if (!PermisosFamilia.puedeVer()) {
                document.querySelector('main').innerHTML = '<div style="text-align:center;padding:60px 20px;"><div style="font-size:3rem;opacity:0.3;">🔒</div><h2 style="font-family:Quicksand,sans-serif;">Sin acceso</h2><p style="color:#9A9A9A;">No tienes permisos para ver gastos.</p></div>';
                return;
              }
            }
          } catch (e) { console.log('PermisosFamilia:', e.message); }

          await cargarExternos();
          await cargarGastos();
          renderLista();
          await cargarNidosYLiquidaciones();

          try {
            if (typeof PermisosFamilia !== 'undefined') PermisosFamilia.aplicarUI();
          } catch (e) { console.log('PermisosFamilia UI:', e.message); }
        } else {
          window.location.href = 'login.html';
        }
      });
    });

    // ===== CARGAR DATOS =====
    async function cargarBien() {
      const doc = await db.collection('bienes').doc(bienId).get();
      if (!doc.exists) { alert('Bien no encontrado'); return; }
      bienData = doc.data();
      document.getElementById('bien-nombre').textContent = bienData.nombre || '';

      // Cargar cuentas
      const sel = document.getElementById('g-cuenta');
      sel.innerHTML = '<option value="">— Sin especificar —</option>';
      (bienData.cuentas || []).forEach(c => { sel.innerHTML += `<option value="${c}">${c}</option>`; });
    }

    async function cargarExternos() {
      externosNombres = [];
      console.log('[DEBUG] cargarExternos: bienId=', bienId);
      try {
        const snap = await db.collection('bienes').doc(bienId).collection('externos').get();
        console.log('[DEBUG] externos encontrados:', snap.size);
        const rolIcons = { casero: '🏠', hoster: '🏨', guarda: '🌾', oficina: '🏢', otro: '👤' };
        snap.docs.forEach(d => {
          const data = d.data();
          console.log('[DEBUG] externo:', d.id, data.nombre, 'activo:', data.activo, 'rol:', data.rol);
          if (data.activo === false) return;
          const nombre = data.nombre || data.email || '';
          const rol = data.rol || 'otro';
          if (nombre) externosNombres.push({ nombre, rol: `${rolIcons[rol] || '👤'} ${rol.charAt(0).toUpperCase() + rol.slice(1)}`, email: data.email || '' });
        });
        console.log('[DEBUG] externosNombres final:', externosNombres.length, externosNombres);
      } catch(e) { console.warn('[DEBUG] ERROR cargarExternos:', e); }
    }

    async function cargarGastos() {
      try {
        const snap = await db.collection('bienes').doc(bienId).collection('gastos').orderBy('fecha', 'desc').get();
        gastos = snap.docs.map(d => {
          const data = d.data();
          let fecha = data.fecha;
          if (fecha?.toDate) fecha = fecha.toDate().toISOString().split('T')[0];
          else if (fecha instanceof Date) fecha = fecha.toISOString().split('T')[0];
          return { id: d.id, ...data, fecha };
        });
      } catch(e) {
        console.error('Error cargando gastos:', e);
        // Fallback: sin orderBy (puede faltar índice)
        try {
          const snap = await db.collection('bienes').doc(bienId).collection('gastos').get();
          gastos = snap.docs.map(d => {
            const data = d.data();
            let fecha = data.fecha;
            if (fecha?.toDate) fecha = fecha.toDate().toISOString().split('T')[0];
            else if (fecha instanceof Date) fecha = fecha.toISOString().split('T')[0];
            return { id: d.id, ...data, fecha };
          }).sort((a, b) => (b.fecha || '').localeCompare(a.fecha || ''));
        } catch(e2) { console.error(e2); gastos = []; }
      }
    }

    // ===== RENDER =====
    function renderLista() {
      const lista = document.getElementById('lista-gastos');
      const empty = document.getElementById('empty-state');

      let items = [...gastos];

      // Aplicar filtros
      const filtCat = document.getElementById('filtro-cat').value;
      const filtMed = document.getElementById('filtro-medio').value;
      const filtAnot = document.getElementById('filtro-anotador').value;
      if (filtCat) items = items.filter(g => g.categoria === filtCat);
      if (filtMed) items = items.filter(g => g.medio === filtMed || g.medioPago === filtMed);
      if (filtAnot) items = items.filter(g => (g.anotador || g.pagadorNombre || '') === filtAnot);

      // Poblar filtro categorías dinámicamente
      const selCat = document.getElementById('filtro-cat');
      const prevCat = selCat.value;
      const cats = new Set();
      gastos.forEach(g => { if (g.categoria) cats.add(g.categoria); });
      selCat.innerHTML = '<option value="">📁 Todas las categorías</option>' +
        Array.from(cats).sort().map(c => `<option value="${c}">${CAT_LABELS[c] || c}</option>`).join('');
      selCat.value = prevCat;

      // Poblar filtro anotadores dinámicamente
      const selAnot = document.getElementById('filtro-anotador');
      const prevAnot = selAnot.value;
      const anots = new Set();
      gastos.forEach(g => { const a = g.anotador || g.pagadorNombre; if (a) anots.add(a); });
      selAnot.innerHTML = '<option value="">👤 Todos los que apuntan</option>' +
        Array.from(anots).sort().map(a => `<option value="${a}">${a}</option>`).join('');
      selAnot.value = prevAnot;

      if (!items.length) {
        lista.innerHTML = '';
        empty.style.display = '';
        updateSummary(items);
        return;
      }
      empty.style.display = 'none';

      // Agrupar por mes
      const meses = {};
      items.forEach(g => {
        const mes = g.fecha ? g.fecha.substring(0, 7) : 'sin-fecha';
        if (!meses[mes]) meses[mes] = [];
        meses[mes].push(g);
      });

      let html = '';
      let totalGeneral = 0;

      Object.keys(meses).sort().reverse().forEach(mes => {
        const regs = meses[mes];
        const totalMes = regs.reduce((s, g) => s + (parseFloat(g.importe) || 0), 0);
        totalGeneral += totalMes;
        const mesLabel = mes === 'sin-fecha' ? 'Sin fecha' :
          new Date(mes + '-01').toLocaleDateString('es-ES', { month: 'long', year: 'numeric' });

        html += `<div style="margin-bottom:16px;">
          <div class="gasto-mes-header">
            <span style="text-transform:capitalize;">${mesLabel}</span>
            <span>${fN(totalMes)} €</span>
          </div>`;

        regs.forEach(g => {
          const catLabel = CAT_LABELS[g.categoria] || g.categoria || '';
          const medioIcon = MEDIO_ICONS[g.medio || g.medioPago] || '';
          const anotador = g.anotador || g.pagadorNombre || '';
          const cuenta = g.cuenta || '';
          const imp = parseFloat(g.importe) || 0;

          html += `<div class="gasto-item" onclick="editarGasto('${g.id}')" ${g.liquidacionId ? 'style="border-left-color:var(--success);"' : ''}>
            <span class="gasto-fecha">${fD(g.fecha)}</span>
            <span class="gasto-concepto">
              ${g.concepto || '—'}
              <div class="gasto-detalle">${catLabel}${cuenta ? ' · 🏦' + cuenta : ''}${anotador ? ' · 👤' + anotador : ''}${g.liquidacionId ? ' · <span style="color:var(--success);font-weight:600;">✓ repartido</span>' : ''}</div>
            </span>
            <span style="display:flex;align-items:center;gap:4px;">
              ${medioIcon ? `<span style="font-size:0.75rem;">${medioIcon}</span>` : ''}
              <span class="gasto-importe">${fN(imp)} €</span>
            </span>
          </div>`;
        });

        html += '</div>';
      });

      html += `<div class="total-bar">
        <span>Total (${items.length} gastos)</span>
        <span>${fN(totalGeneral)} €</span>
      </div>`;

      lista.innerHTML = html;
      updateSummary(items);
    }

    function updateSummary(items) {
      const total = items.reduce((s, g) => s + (parseFloat(g.importe) || 0), 0);
      document.getElementById('sum-total').textContent = fN(total) + ' €';
      document.getElementById('sum-count').textContent = items.length;
      document.getElementById('sum-media').textContent = items.length > 0 ? fN(total / items.length) + ' €' : '—';
    }

    // ===== MODAL =====
    function abrirModal() {
      editandoId = null;
      document.getElementById('modal-title').textContent = '💶 Nuevo gasto';
      document.getElementById('btn-eliminar').style.display = 'none';
      document.getElementById('g-fecha').value = new Date().toISOString().split('T')[0];
      document.getElementById('g-concepto').value = '';
      document.getElementById('g-categoria').value = '';
      document.getElementById('g-importe').value = '';
      document.getElementById('g-medio').value = '';
      document.getElementById('g-cuenta').value = '';
      document.getElementById('g-cuenta-new').value = '';
      document.getElementById('g-cuenta-new').style.display = 'none';
      document.getElementById('g-notas').value = '';
      document.getElementById('g-anotador').value = '';
      document.getElementById('g-anotador-new').value = '';
      document.getElementById('g-anotador-new').style.display = 'none';
      cargarAnotadores();
      document.getElementById('modal-gasto').classList.add('open');
    }

    function editarGasto(id) {
      const g = gastos.find(x => x.id === id);
      if (!g) return;
      editandoId = id;
      document.getElementById('modal-title').textContent = '✏️ Editar gasto';
      document.getElementById('btn-eliminar').style.display = '';
      document.getElementById('g-fecha').value = g.fecha || '';
      document.getElementById('g-concepto').value = g.concepto || '';
      document.getElementById('g-categoria').value = g.categoria || '';
      document.getElementById('g-importe').value = g.importe || '';
      document.getElementById('g-medio').value = g.medio || g.medioPago || '';
      document.getElementById('g-cuenta').value = g.cuenta || '';
      document.getElementById('g-cuenta-new').value = '';
      document.getElementById('g-cuenta-new').style.display = 'none';
      document.getElementById('g-notas').value = g.notas || '';
      cargarAnotadores();
      document.getElementById('g-anotador').value = g.anotador || g.pagadorNombre || '';
      document.getElementById('g-anotador-new').value = '';
      document.getElementById('g-anotador-new').style.display = 'none';
      document.getElementById('modal-gasto').classList.add('open');
    }

    function cerrarModal() {
      document.getElementById('modal-gasto').classList.remove('open');
    }

    function cargarAnotadores() {
      console.log('[DEBUG] cargarAnotadores llamada. externosNombres:', externosNombres.length);
      const sel = document.getElementById('g-anotador');
      sel.innerHTML = '<option value="">— Yo mismo —</option>';

      if (externosNombres.length) {
        let html = '<optgroup label="Externos del bien">';
        externosNombres.forEach(e => { html += `<option value="${e.nombre}">${e.rol} ${e.nombre}</option>`; });
        html += '</optgroup>';
        sel.innerHTML += html;
      }

      // Añadir anteriores que no estén en externos
      const extNames = new Set(externosNombres.map(e => e.nombre));
      const anteriores = new Set();
      gastos.forEach(g => {
        const a = g.anotador || g.pagadorNombre;
        if (a && !extNames.has(a)) anteriores.add(a);
      });
      if (anteriores.size) {
        let html = '<optgroup label="Anteriores">';
        anteriores.forEach(a => { html += `<option value="${a}">${a}</option>`; });
        html += '</optgroup>';
        sel.innerHTML += html;
      }
    }

    function toggleNuevaCuenta() {
      const inp = document.getElementById('g-cuenta-new');
      inp.style.display = inp.style.display === 'none' ? '' : 'none';
      if (inp.style.display !== 'none') inp.focus();
    }

    function toggleNuevoAnotador() {
      const inp = document.getElementById('g-anotador-new');
      inp.style.display = inp.style.display === 'none' ? '' : 'none';
      if (inp.style.display !== 'none') inp.focus();
    }

    // ===== GUARDAR =====
    async function guardarGasto() {
      const fecha = document.getElementById('g-fecha').value;
      const concepto = document.getElementById('g-concepto').value.trim();
      const categoria = document.getElementById('g-categoria').value;
      const importe = parseFloat(document.getElementById('g-importe').value);

      if (!fecha || !concepto || !categoria || isNaN(importe) || importe <= 0) {
        alert('Completa los campos obligatorios: Fecha, Concepto, Categoría e Importe');
        return;
      }

      const medio = document.getElementById('g-medio').value;
      const cuentaNew = document.getElementById('g-cuenta-new').value.trim();
      const cuenta = cuentaNew || document.getElementById('g-cuenta').value;
      const notas = document.getElementById('g-notas').value.trim();
      const anotadorNew = document.getElementById('g-anotador-new').value.trim();
      const anotador = anotadorNew || document.getElementById('g-anotador').value;

      // Si hay cuenta nueva, guardarla en el bien
      if (cuentaNew && !(bienData.cuentas || []).includes(cuentaNew)) {
        const cuentas = [...(bienData.cuentas || []), cuentaNew];
        await db.collection('bienes').doc(bienId).update({ cuentas });
        bienData.cuentas = cuentas;
        const sel = document.getElementById('g-cuenta');
        sel.innerHTML = '<option value="">— Sin especificar —</option>';
        cuentas.forEach(c => { sel.innerHTML += `<option value="${c}">${c}</option>`; });
      }

      const data = {
        fecha,
        concepto,
        categoria,
        importe,
        medio: medio || null,
        cuenta: cuenta || null,
        notas: notas || null,
        anotador: anotador || null,
        fechaActualizacion: firebase.firestore.FieldValue.serverTimestamp()
      };

      try {
        const ref = db.collection('bienes').doc(bienId).collection('gastos');
        if (editandoId) {
          await ref.doc(editandoId).update(data);
        } else {
          data.creadoPor = currentUser.uid;
          data.fechaCreacion = firebase.firestore.FieldValue.serverTimestamp();
          await ref.add(data);
        }
        cerrarModal();
        await cargarGastos();
        renderLista();
      } catch(e) {
        console.error(e);
        alert('Error al guardar: ' + e.message);
      }
    }

    async function eliminarGasto() {
      if (!editandoId) return;
      if (!confirm('¿Eliminar este gasto?')) return;
      try {
        await db.collection('bienes').doc(bienId).collection('gastos').doc(editandoId).delete();
        cerrarModal();
        await cargarGastos();
        renderLista();
      } catch(e) {
        alert('Error: ' + e.message);
      }
    }

    // ===== HELPERS =====
    function fN(n) { return (n || 0).toLocaleString('es-ES', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
    function fD(d) {
      if (!d) return '—';
      const p = d.split('-');
      return p.length === 3 ? `${p[2]}/${p[1]}` : d;
    }

    // ========== PDF DESCARGA DIRECTA ==========
    function generarPDF() {
      const bienNombre = document.getElementById('bien-nombre')?.textContent || 'Bien';
      
      let items = [...gastos];
      const filtCat = document.getElementById('filtro-cat').value;
      const filtMed = document.getElementById('filtro-medio').value;
      const filtAnot = document.getElementById('filtro-anotador').value;
      if (filtCat) items = items.filter(g => g.categoria === filtCat);
      if (filtMed) items = items.filter(g => g.medio === filtMed || g.medioPago === filtMed);
      if (filtAnot) items = items.filter(g => (g.anotador || g.pagadorNombre || '') === filtAnot);
      
      const total = items.reduce((s, g) => s + (parseFloat(g.importe) || 0), 0);
      const media = items.length > 0 ? total / items.length : 0;
      
      // Agrupar por mes
      const meses = {};
      items.forEach(g => {
        const mes = g.fecha ? g.fecha.substring(0, 7) : 'sin-fecha';
        if (!meses[mes]) meses[mes] = [];
        meses[mes].push(g);
      });
      
      let tablas = '';
      Object.keys(meses).sort().reverse().forEach(mes => {
        const regs = meses[mes];
        const totalMes = regs.reduce((s, g) => s + (parseFloat(g.importe) || 0), 0);
        const mesLabel = mes === 'sin-fecha' ? 'Sin fecha' :
          new Date(mes + '-01').toLocaleDateString('es-ES', { month: 'long', year: 'numeric' });
        
        let filas = regs.map(g => `<tr>
          <td style="padding:6px 8px;border-bottom:1px solid #eee;font-size:11px;">${g.fecha || '-'}</td>
          <td style="padding:6px 8px;border-bottom:1px solid #eee;">${g.concepto || '-'}</td>
          <td style="padding:6px 8px;border-bottom:1px solid #eee;font-size:11px;">${CAT_LABELS[g.categoria] || g.categoria || '-'}</td>
          <td style="padding:6px 8px;border-bottom:1px solid #eee;font-size:11px;">${g.anotador || g.pagadorNombre || '-'}</td>
          <td style="padding:6px 8px;border-bottom:1px solid #eee;text-align:right;font-weight:600;">${(parseFloat(g.importe) || 0).toFixed(2)} €</td>
        </tr>`).join('');
        
        tablas += `
          <div style="margin-bottom:20px;">
            <div style="display:flex;justify-content:space-between;padding:8px 12px;background:#F5F0E8;border-radius:6px;margin-bottom:8px;font-weight:700;font-size:13px;text-transform:capitalize;">
              <span>${mesLabel}</span><span>${totalMes.toFixed(2)} €</span>
            </div>
            <table style="width:100%;border-collapse:collapse;font-size:12px;">
              <thead><tr style="background:#7A9E7E;color:white;">
                <th style="padding:6px 8px;text-align:left;">Fecha</th>
                <th style="padding:6px 8px;text-align:left;">Concepto</th>
                <th style="padding:6px 8px;text-align:left;">Categoría</th>
                <th style="padding:6px 8px;text-align:left;">Anotador</th>
                <th style="padding:6px 8px;text-align:right;">Importe</th>
              </tr></thead>
              <tbody>${filas}</tbody>
            </table>
          </div>`;
      });
      
      const div = document.createElement('div');
      div.innerHTML = `
        <div style="font-family:Helvetica,Arial,sans-serif;padding:10px;color:#333;">
          <div style="text-align:center;margin-bottom:20px;">
            <h2 style="margin:0;color:#5C7D5F;">💶 Gastos</h2>
            <p style="margin:4px 0;color:#888;">${bienNombre}</p>
            <p style="margin:2px 0;font-size:11px;color:#aaa;">${new Date().toLocaleDateString('es-ES')}</p>
          </div>
          <div style="display:flex;gap:30px;justify-content:center;margin-bottom:20px;font-size:13px;">
            <span>Total: <b>${total.toFixed(2)} €</b></span>
            <span>Registros: <b>${items.length}</b></span>
            <span>Media: <b>${media.toFixed(2)} €</b></span>
          </div>
          ${tablas || '<p style="text-align:center;color:#aaa;">Sin gastos registrados</p>'}
          <div style="text-align:center;margin-top:30px;font-size:10px;color:#bbb;">FAMILYNK · Gastos</div>
        </div>
      `;
      
      html2pdf().set({
        margin: [10, 10, 15, 10],
        filename: 'gastos-' + bienNombre.replace(/[^a-zA-Z0-9]/g, '_') + '.pdf',
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2 },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
      }).from(div).save();
    }

    // ========== TABS ==========
    function cambiarTab(tab) {
      document.querySelectorAll('.gastos-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      document.querySelector(`.gastos-tab:nth-child(${tab === 'registro' ? 1 : 2})`).classList.add('active');
      document.getElementById(`tab-${tab}`).classList.add('active');
      if (tab === 'reparto') renderHistorialLiq();
    }

    // ========== LIQUIDACIONES ==========
    let liqGastosSeleccionados = new Set();
    let liqNidosConfig = {}; // { nidoId: { activo: bool, porcentaje: num } }

    async function cargarNidosYLiquidaciones() {
      try {
        const famId = bienData?.familiaId;
        if (!famId) return;
        const nidosSnap = await db.collection('nidos').where('familiaId', '==', famId).get();
        nidosData = nidosSnap.docs.map(d => ({ id: d.id, ...d.data() }));

        const liqSnap = await db.collection('bienes').doc(bienId)
          .collection('liquidaciones').orderBy('creado', 'desc').get();
        liquidaciones = liqSnap.docs.map(d => ({ id: d.id, ...d.data() }));
      } catch (e) { console.error('Error cargando liquidaciones:', e); }
    }

    function renderHistorialLiq() {
      const container = document.getElementById('liquidaciones-historial');
      if (liquidaciones.length === 0) {
        container.innerHTML = `<div class="liq-empty">
          <div class="liq-empty-icon">📊</div>
          <div style="font-weight:600;">Sin liquidaciones</div>
          <div style="font-size:0.85rem;">Crea tu primera liquidación para repartir gastos entre nidos</div>
        </div>`;
        return;
      }
      container.innerHTML = liquidaciones.map(liq => {
        const fecha = liq.creado?.toDate ? liq.creado.toDate().toLocaleDateString('es-ES', { day: 'numeric', month: 'short', year: 'numeric' }) : '-';
        const nidosChips = Object.values(liq.nidos || {}).map(n =>
          `<span class="liq-card-nido">${n.nombre} ${n.porcentaje}% · €${n.importe.toFixed(2)}</span>`
        ).join('');
        return `<div class="liq-card">
          <div class="liq-card-header" onclick="verDetalleLiq('${liq.id}')">
            <span class="liq-card-nombre">${liq.nombre || 'Sin nombre'}</span>
            <span class="liq-card-total">€${(liq.total || 0).toFixed(2)}</span>
          </div>
          <div class="liq-card-meta" onclick="verDetalleLiq('${liq.id}')">${fecha} · ${(liq.gastosIds || []).length} gastos${liq.iban ? ' · 🏦 ' + liq.iban.slice(-8) : ''}</div>
          <div class="liq-card-nidos" onclick="verDetalleLiq('${liq.id}')">${nidosChips}</div>
          <div style="display:flex;justify-content:flex-end;margin-top:8px;">
            <button class="btn-mini" onclick="event.stopPropagation(); generarPDFLiquidacion('${liq.id}')" style="display:flex;align-items:center;gap:4px;">📄 PDF</button>
          </div>
        </div>`;
      }).join('');
    }

    function verDetalleLiq(id) {
      const liq = liquidaciones.find(l => l.id === id);
      if (!liq) return;
      const nidosHtml = Object.values(liq.nidos || {}).map(n =>
        `<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--cream-dark);font-size:0.88rem;">
          <span>${n.nombre} (${n.porcentaje}%)</span><span style="font-weight:700;">€${n.importe.toFixed(2)}</span>
        </div>`
      ).join('');
      const gastosHtml = (liq.gastosIds || []).map(gId => {
        const g = gastos.find(x => x.id === gId);
        return g ? `<div style="display:flex;justify-content:space-between;font-size:0.8rem;padding:3px 0;">
          <span>${g.concepto || '-'}</span><span>€${(parseFloat(g.importe) || 0).toFixed(2)}</span>
        </div>` : '';
      }).join('');
      const fecha = liq.creado?.toDate ? liq.creado.toDate().toLocaleDateString('es-ES') : '-';
      const ibanHtml = liq.iban ? `<div style="margin:12px 0;padding:10px;background:var(--cream-medium);border-radius:8px;font-family:monospace;font-size:0.85rem;letter-spacing:1px;text-align:center;">🏦 ${liq.iban}</div>` : '';
      alert_html(`
        <h3 style="font-family:Quicksand;margin-bottom:4px;">${liq.nombre}</h3>
        <p style="font-size:0.8rem;color:var(--text-muted);margin-bottom:12px;">${fecha} · €${(liq.total || 0).toFixed(2)}</p>
        ${ibanHtml}
        <div style="font-weight:700;font-size:0.82rem;margin-bottom:6px;">Reparto:</div>
        ${nidosHtml}
        <div style="font-weight:700;font-size:0.82rem;margin:12px 0 6px;">Gastos incluidos (${(liq.gastosIds || []).length}):</div>
        <div style="max-height:150px;overflow-y:auto;">${gastosHtml || '<span style="color:var(--text-muted);">-</span>'}</div>
        <button onclick="this.closest('div[style*=fixed]').remove(); generarPDFLiquidacion('${id}')" style="margin-top:12px;width:100%;padding:10px;background:white;color:var(--addon-dark);border:2px solid var(--addon-color);border-radius:8px;font-family:Nunito;font-weight:600;cursor:pointer;">📄 Descargar PDF</button>
      `);
    }

    function alert_html(html) {
      const overlay = document.createElement('div');
      overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:2000;';
      overlay.innerHTML = `<div style="background:white;border-radius:16px;padding:24px;max-width:460px;width:92%;max-height:80vh;overflow-y:auto;box-shadow:0 8px 30px rgba(0,0,0,0.15);">
        ${html}
        <button onclick="this.closest('div[style*=fixed]').remove()" style="margin-top:16px;width:100%;padding:10px;background:var(--addon-color);color:white;border:none;border-radius:8px;font-family:Nunito;font-weight:600;cursor:pointer;">Cerrar</button>
      </div>`;
      document.body.appendChild(overlay);
      overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
    }

    // ========== MODAL NUEVA LIQUIDACIÓN ==========
    function abrirModalLiquidacion() {
      document.getElementById('liq-nombre').value = '';
      document.getElementById('liq-iban').value = bienData?.ibanLiquidaciones || '';
      liqGastosSeleccionados = new Set();
      liqNidosConfig = {};
      nidosData.forEach(n => { liqNidosConfig[n.id] = { activo: true, porcentaje: 0 }; });
      // Porcentaje equitativo inicial
      const pctBase = nidosData.length > 0 ? Math.floor(100 / nidosData.length) : 100;
      nidosData.forEach((n, i) => {
        liqNidosConfig[n.id].porcentaje = i === 0 ? 100 - (pctBase * (nidosData.length - 1)) : pctBase;
      });

      renderLiqGastos();
      renderLiqNidos();
      actualizarLiqTotales();
      document.getElementById('modal-liquidacion').classList.add('open');
    }

    function cerrarModalLiq() {
      document.getElementById('modal-liquidacion').classList.remove('open');
    }

    function renderLiqGastos() {
      const container = document.getElementById('liq-gastos-lista');
      if (gastos.length === 0) {
        container.innerHTML = '<div style="padding:16px;text-align:center;color:var(--text-muted);">Sin gastos registrados</div>';
        return;
      }
      container.innerHTML = gastos.map(g => {
        const yaRepartido = g.liquidacionId && g.liquidacionId !== '';
        const fecha = g.fecha ? new Date(g.fecha).toLocaleDateString('es-ES', { day: '2-digit', month: 'short' }) : '-';
        const checked = liqGastosSeleccionados.has(g.id) ? 'checked' : '';
        return `<label class="liq-gasto-row ${yaRepartido ? 'disabled' : ''}">
          <input type="checkbox" ${checked} ${yaRepartido ? 'disabled' : ''} onchange="toggleLiqGasto('${g.id}', this.checked)">
          <span style="font-size:0.72rem;color:var(--text-muted);min-width:55px;">${fecha}</span>
          <span class="liq-gasto-concepto">${g.concepto || '-'}</span>
          ${yaRepartido ? '<span class="liq-gasto-badge">repartido</span>' : ''}
          <span class="liq-gasto-importe">€${(parseFloat(g.importe) || 0).toFixed(2)}</span>
        </label>`;
      }).join('');
    }

    function toggleLiqGasto(id, checked) {
      if (checked) liqGastosSeleccionados.add(id);
      else liqGastosSeleccionados.delete(id);
      actualizarLiqTotales();
    }

    function liqSeleccionarTodos() {
      gastos.forEach(g => { if (!g.liquidacionId) liqGastosSeleccionados.add(g.id); });
      renderLiqGastos();
      actualizarLiqTotales();
    }

    function liqDeseleccionarTodos() {
      liqGastosSeleccionados.clear();
      renderLiqGastos();
      actualizarLiqTotales();
    }

    function renderLiqNidos() {
      const container = document.getElementById('liq-nidos-lista');
      container.innerHTML = nidosData.map((nido, i) => {
        const color = NIDO_COLORS[i % NIDO_COLORS.length];
        const cfg = liqNidosConfig[nido.id] || { activo: false, porcentaje: 0 };
        return `<div class="liq-nido-row">
          <input type="checkbox" class="liq-nido-check" ${cfg.activo ? 'checked' : ''} 
            onchange="toggleLiqNido('${nido.id}', this.checked)">
          <div style="width:10px;height:10px;border-radius:3px;background:${color};flex-shrink:0;"></div>
          <div class="liq-nido-nombre">${nido.nombre || 'Nido ' + (i+1)}</div>
          <input type="number" class="liq-nido-pct" id="liq-pct-${nido.id}" 
            value="${cfg.porcentaje}" min="0" max="100" ${!cfg.activo ? 'disabled' : ''}
            onchange="cambiarLiqPct('${nido.id}', this.value)"> %
          <div class="liq-nido-importe" id="liq-imp-${nido.id}">€0.00</div>
        </div>`;
      }).join('');
    }

    function toggleLiqNido(nidoId, activo) {
      liqNidosConfig[nidoId].activo = activo;
      if (!activo) liqNidosConfig[nidoId].porcentaje = 0;
      const input = document.getElementById(`liq-pct-${nidoId}`);
      if (input) { input.disabled = !activo; input.value = liqNidosConfig[nidoId].porcentaje; }
      actualizarLiqTotales();
    }

    function cambiarLiqPct(nidoId, val) {
      liqNidosConfig[nidoId].porcentaje = parseInt(val) || 0;
      actualizarLiqTotales();
    }

    function actualizarLiqTotales() {
      const totalGastos = Array.from(liqGastosSeleccionados).reduce((sum, id) => {
        const g = gastos.find(x => x.id === id);
        return sum + (g ? parseFloat(g.importe) || 0 : 0);
      }, 0);

      document.getElementById('liq-gastos-count').textContent =
        `${liqGastosSeleccionados.size} seleccionados · €${totalGastos.toFixed(2)}`;

      let totalPct = 0;
      nidosData.forEach(nido => {
        const cfg = liqNidosConfig[nido.id];
        if (!cfg) return;
        totalPct += cfg.activo ? cfg.porcentaje : 0;
        const importe = totalGastos * (cfg.activo ? cfg.porcentaje : 0) / 100;
        const el = document.getElementById(`liq-imp-${nido.id}`);
        if (el) el.textContent = `€${importe.toFixed(2)}`;
      });

      const bar = document.getElementById('liq-total-bar');
      bar.className = 'reparto-total-bar ' + (totalPct === 100 ? 'ok' : 'error');
      document.getElementById('liq-total-pct').textContent = totalPct + '%';

      // Preview
      const preview = document.getElementById('liq-desglose-preview');
      if (liqGastosSeleccionados.size > 0 && totalPct === 100) {
        let html = '<div class="liq-preview"><div class="liq-preview-title">Vista previa del reparto</div>';
        nidosData.forEach(nido => {
          const cfg = liqNidosConfig[nido.id];
          if (!cfg || !cfg.activo || cfg.porcentaje === 0) return;
          const importe = totalGastos * cfg.porcentaje / 100;
          html += `<div class="liq-preview-row"><span>${nido.nombre} (${cfg.porcentaje}%)</span><span style="font-weight:700;">€${importe.toFixed(2)}</span></div>`;
        });
        html += `<div class="liq-preview-row" style="border-top:2px solid var(--addon-color);margin-top:6px;padding-top:8px;font-weight:700;">
          <span>TOTAL</span><span>€${totalGastos.toFixed(2)}</span></div></div>`;
        preview.innerHTML = html;
      } else {
        preview.innerHTML = '';
      }
    }

    async function guardarLiquidacion() {
      const nombre = document.getElementById('liq-nombre').value.trim();
      if (!nombre) { alert('Pon un nombre a la liquidación'); return; }
      if (liqGastosSeleccionados.size === 0) { alert('Selecciona al menos un gasto'); return; }

      const totalPct = Object.values(liqNidosConfig).reduce((s, c) => s + (c.activo ? c.porcentaje : 0), 0);
      if (totalPct !== 100) { alert('Los porcentajes deben sumar 100%'); return; }

      const gastosIds = Array.from(liqGastosSeleccionados);
      const totalGastos = gastosIds.reduce((sum, id) => {
        const g = gastos.find(x => x.id === id);
        return sum + (g ? parseFloat(g.importe) || 0 : 0);
      }, 0);

      const nidos = {};
      nidosData.forEach(nido => {
        const cfg = liqNidosConfig[nido.id];
        if (cfg && cfg.activo && cfg.porcentaje > 0) {
          nidos[nido.id] = {
            nombre: nido.nombre || 'Nido',
            porcentaje: cfg.porcentaje,
            importe: Math.round(totalGastos * cfg.porcentaje / 100 * 100) / 100
          };
        }
      });

      const iban = document.getElementById('liq-iban').value.trim();

      try {
        // 1. Crear liquidación
        const liqRef = await db.collection('bienes').doc(bienId)
          .collection('liquidaciones').add({
            nombre,
            gastosIds,
            total: totalGastos,
            nidos,
            iban: iban || null,
            creadoPor: currentUser.uid,
            creado: firebase.firestore.FieldValue.serverTimestamp()
          });

        // 2. Marcar gastos como repartidos
        const batch = db.batch();
        gastosIds.forEach(gId => {
          batch.update(db.collection('bienes').doc(bienId).collection('gastos').doc(gId), {
            liquidacionId: liqRef.id
          });
        });
        await batch.commit();

        // 3. Guardar IBAN en bien para futuras liquidaciones
        if (iban) {
          await db.collection('bienes').doc(bienId).update({ ibanLiquidaciones: iban });
          bienData.ibanLiquidaciones = iban;
        }

        // 4. Actualizar estado local
        gastosIds.forEach(gId => {
          const g = gastos.find(x => x.id === gId);
          if (g) g.liquidacionId = liqRef.id;
        });

        cerrarModalLiq();
        await cargarNidosYLiquidaciones();
        renderHistorialLiq();
        renderLista(); // Refrescar lista para mostrar badges de repartido
        alert('✅ Liquidación guardada');
      } catch (e) {
        console.error('Error guardando liquidación:', e);
        alert('Error al guardar: ' + e.message);
      }
    }

    // ========== PDF LIQUIDACIÓN ==========
    function generarPDFLiquidacion(id) {
      const liq = liquidaciones.find(l => l.id === id);
      if (!liq) { alert('Liquidación no encontrada'); return; }
      if (typeof html2pdf === 'undefined') { alert('Generador PDF cargando, intenta de nuevo.'); return; }

      const bienNombre = bienData?.nombre || 'Bien';
      const fecha = liq.creado?.toDate ? liq.creado.toDate().toLocaleDateString('es-ES', { day: 'numeric', month: 'long', year: 'numeric' }) : new Date().toLocaleDateString('es-ES');

      // Tabla de reparto por nido
      const nidosRows = Object.values(liq.nidos || {}).map(n =>
        `<tr>
          <td style="padding:6px 10px;border-bottom:1px solid #eee;">${n.nombre}</td>
          <td style="padding:6px 10px;border-bottom:1px solid #eee;text-align:center;">${n.porcentaje}%</td>
          <td style="padding:6px 10px;border-bottom:1px solid #eee;text-align:right;font-weight:700;">€${n.importe.toFixed(2)}</td>
        </tr>`
      ).join('');

      // Tabla de gastos incluidos
      const gastosRows = (liq.gastosIds || []).map(gId => {
        const g = gastos.find(x => x.id === gId);
        if (!g) return '';
        const cat = CAT_LABELS[g.categoria] || g.categoria || '-';
        const fechaG = g.fecha ? new Date(g.fecha).toLocaleDateString('es-ES', { day: '2-digit', month: 'short' }) : '-';
        return `<tr>
          <td style="padding:4px 8px;border-bottom:1px solid #eee;font-size:10px;">${fechaG}</td>
          <td style="padding:4px 8px;border-bottom:1px solid #eee;font-size:10px;">${g.concepto || '-'}</td>
          <td style="padding:4px 8px;border-bottom:1px solid #eee;font-size:10px;">${cat}</td>
          <td style="padding:4px 8px;border-bottom:1px solid #eee;text-align:right;font-size:10px;font-weight:600;">€${(parseFloat(g.importe) || 0).toFixed(2)}</td>
        </tr>`;
      }).join('');

      const ibanBlock = liq.iban 
        ? `<div style="margin:16px 0;padding:12px;background:#f0f5eb;border-radius:8px;text-align:center;">
            <div style="font-size:10px;color:#6B6B6B;text-transform:uppercase;margin-bottom:4px;">Cuenta para ingresos</div>
            <div style="font-family:monospace;font-size:14px;font-weight:700;letter-spacing:1.5px;color:#3D3D3D;">${liq.iban}</div>
          </div>` 
        : '';

      const div = document.createElement('div');
      div.innerHTML = `
        <div style="font-family:'Nunito',Helvetica,sans-serif;padding:16px;max-width:600px;">
          <div style="text-align:center;margin-bottom:14px;padding-bottom:10px;border-bottom:2px solid #8B7355;">
            <div style="font-family:'Quicksand',sans-serif;font-size:18px;font-weight:700;color:#8B7355;">FAMILYNK</div>
            <div style="font-size:14px;font-weight:700;color:#3D3D3D;margin-top:4px;">${liq.nombre}</div>
            <div style="font-size:10px;color:#9A9A9A;">${bienNombre} · ${fecha}</div>
          </div>

          <div style="display:flex;gap:16px;margin-bottom:16px;">
            <div style="flex:1;padding:10px;background:#FDF8F3;border-radius:8px;text-align:center;">
              <div style="font-size:22px;font-weight:700;color:#8B7355;">€${(liq.total || 0).toFixed(2)}</div>
              <div style="font-size:9px;color:#9A9A9A;text-transform:uppercase;">Total a repartir</div>
            </div>
            <div style="flex:1;padding:10px;background:#FDF8F3;border-radius:8px;text-align:center;">
              <div style="font-size:22px;font-weight:700;color:#8B7355;">${(liq.gastosIds || []).length}</div>
              <div style="font-size:9px;color:#9A9A9A;text-transform:uppercase;">Gastos incluidos</div>
            </div>
            <div style="flex:1;padding:10px;background:#FDF8F3;border-radius:8px;text-align:center;">
              <div style="font-size:22px;font-weight:700;color:#8B7355;">${Object.keys(liq.nidos || {}).length}</div>
              <div style="font-size:9px;color:#9A9A9A;text-transform:uppercase;">Nidos</div>
            </div>
          </div>

          ${ibanBlock}

          <div style="font-weight:700;font-size:12px;color:#6B5A42;margin-bottom:8px;">📊 REPARTO</div>
          <table style="width:100%;border-collapse:collapse;margin-bottom:20px;">
            <thead>
              <tr style="background:#8B7355;color:white;">
                <th style="padding:6px 10px;text-align:left;font-size:10px;">NIDO</th>
                <th style="padding:6px 10px;text-align:center;font-size:10px;">%</th>
                <th style="padding:6px 10px;text-align:right;font-size:10px;">IMPORTE</th>
              </tr>
            </thead>
            <tbody>
              ${nidosRows}
              <tr style="border-top:2px solid #8B7355;">
                <td style="padding:8px 10px;font-weight:700;">TOTAL</td>
                <td style="padding:8px 10px;text-align:center;font-weight:700;">100%</td>
                <td style="padding:8px 10px;text-align:right;font-weight:700;">€${(liq.total || 0).toFixed(2)}</td>
              </tr>
            </tbody>
          </table>

          <div style="font-weight:700;font-size:12px;color:#6B5A42;margin-bottom:8px;">💶 GASTOS INCLUIDOS</div>
          <table style="width:100%;border-collapse:collapse;">
            <thead>
              <tr style="background:#F5EDE4;">
                <th style="padding:5px 8px;text-align:left;font-size:9px;">FECHA</th>
                <th style="padding:5px 8px;text-align:left;font-size:9px;">CONCEPTO</th>
                <th style="padding:5px 8px;text-align:left;font-size:9px;">CATEGORÍA</th>
                <th style="padding:5px 8px;text-align:right;font-size:9px;">IMPORTE</th>
              </tr>
            </thead>
            <tbody>${gastosRows}</tbody>
          </table>

          <div style="margin-top:20px;padding-top:10px;border-top:1px solid #eee;font-size:9px;color:#9A9A9A;text-align:center;">
            Generado: ${new Date().toLocaleDateString('es-ES')} · FAMILYNK
          </div>
        </div>
      `;
      document.body.appendChild(div);

      const filename = `Liquidacion_${(liq.nombre || 'reparto').replace(/[^a-zA-Z0-9áéíóúñ ]/gi, '').trim().replace(/ +/g, '-')}_${new Date().toISOString().slice(0,10)}.pdf`;

      html2pdf().set({
        margin: [8, 8, 8, 8],
        filename: filename,
        html2canvas: { scale: 2 },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
      }).from(div).save().then(() => document.body.removeChild(div));
    }
  </script>
</body>
</html>
