<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FAMILYNK — Estancias</title>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --sage: #7A9E7E; --sage-dark: #5C7D5F; --sage-light: #9BB89E; --sage-muted: rgba(122,158,126,0.15);
      --cream: #FDF8F3; --cream-dark: #F5EDE4; --cream-medium: #FAF5EF;
      --terracotta: #C17757; --text: #3D3D3D; --text-light: #6B6B6B; --text-muted: #9A9A9A;
      --white: #FFFFFF; --success: #7DB59A; --warning: #E8B44D; --error: #D4695A;
      --mayordomo: #8B7355; --mayordomo-dark: #6B5A42; --mayordomo-light: #A69076; --mayordomo-muted: rgba(139,115,85,0.15);
      --shadow-soft: 0 2px 8px rgba(0,0,0,0.06); --shadow-medium: 0 4px 16px rgba(0,0,0,0.08);
      --radius-sm: 8px; --radius-md: 12px; --radius-lg: 16px; --radius-full: 50px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Nunito', sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; }

    .header {
      background: linear-gradient(135deg, var(--mayordomo) 0%, var(--mayordomo-dark) 100%);
      color: white; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between;
      box-shadow: var(--shadow-medium); position: sticky; top: 0; z-index: 100;
    }
    .header.gerente { background: linear-gradient(135deg, #2D4A5C 0%, #1A3344 100%); }
    .header.capataz { background: linear-gradient(135deg, #2D5A3F 0%, #1A3D2A 100%); }
    .header-left { display: flex; align-items: center; gap: 16px; }
    .back-btn { color: white; text-decoration: none; font-family: 'Quicksand'; font-weight: 600; font-size: 0.9rem; }
    .header-title { display: flex; align-items: center; gap: 10px; }
    .header-icon { font-size: 1.5rem; }
    .header-info h1 { font-family: 'Quicksand'; font-size: 1.1rem; font-weight: 700; }
    .header-info p { font-size: 0.8rem; opacity: 0.8; }
    .header-actions { display: flex; gap: 8px; align-items: center; }

    .main { max-width: 960px; margin: 0 auto; padding: 20px; }
    .loading { display: flex; justify-content: center; padding: 60px; }
    .spinner { width: 40px; height: 40px; border: 3px solid var(--cream-dark); border-top-color: var(--mayordomo); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { display: none !important; }

    /* Nueva estancia dropdown */
    .dropdown-nueva { position: relative; display: inline-block; }
    .dropdown-toggle {
      padding: 8px 16px; background: white; color: var(--mayordomo-dark); border: 2px solid rgba(255,255,255,0.4);
      border-radius: var(--radius-sm); font-family: 'Quicksand'; font-weight: 700; font-size: 0.85rem; cursor: pointer;
    }
    .dropdown-toggle:hover { background: rgba(255,255,255,0.9); }
    .dropdown-menu {
      display: none; position: absolute; right: 0; top: 110%; min-width: 220px; background: white;
      border-radius: var(--radius-md); box-shadow: var(--shadow-medium); z-index: 200; overflow: hidden;
    }
    .dropdown-menu.open { display: block; }
    .dropdown-item { display: flex; align-items: center; gap: 10px; padding: 12px 16px; cursor: pointer; font-size: 0.88rem; }
    .dropdown-item:hover { background: var(--cream-medium); }
    .dropdown-separator { height: 1px; background: var(--cream-dark); margin: 4px 0; }
    .dropdown-item-color { width: 12px; height: 12px; border-radius: 3px; }
    .dropdown-item-color.familiar, .dropdown-item-color.nietos_amigos, .dropdown-item-color.finde_asignado { background: var(--sage); }
    .dropdown-item-color.evento { background: #5B9BD5; }
    .dropdown-item-color.otros { background: #E8A87C; }

    /* Leyenda compacta */
    .leyenda-bar { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 16px; padding: 10px 16px; background: var(--white); border-radius: var(--radius-md); box-shadow: var(--shadow-soft); }
    .leyenda-chip { display: flex; align-items: center; gap: 5px; font-size: 0.75rem; color: var(--text-light); }
    .leyenda-dot { width: 10px; height: 10px; border-radius: 3px; }
    .leyenda-dot.familiar { background: var(--sage); }
    .leyenda-dot.evento { background: #5B9BD5; }
    .leyenda-dot.otros { background: #E8A87C; }
    .leyenda-dot.borrador { background: var(--cream-dark); border: 1px dashed var(--text-muted); }

    /* Stats row */
    .stats-row { display: flex; gap: 12px; margin-bottom: 16px; }
    .stat-pill { flex: 1; text-align: center; padding: 10px; background: var(--white); border-radius: var(--radius-md); box-shadow: var(--shadow-soft); }
    .stat-num { font-family: 'Quicksand'; font-weight: 700; font-size: 1.3rem; color: var(--mayordomo); }
    .stat-label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; }

    /* Tabla por meses */
    .mes-bloque { background: var(--white); border-radius: var(--radius-md); box-shadow: var(--shadow-soft); margin-bottom: 12px; overflow: hidden; }
    .mes-header {
      display: flex; justify-content: space-between; align-items: center; padding: 14px 18px;
      background: var(--mayordomo); color: white; cursor: pointer; user-select: none; transition: background 0.2s;
    }
    .mes-header:hover { background: var(--mayordomo-dark); }
    .mes-header-left { display: flex; align-items: center; gap: 10px; }
    .mes-header-titulo { font-family: 'Quicksand'; font-weight: 700; font-size: 0.95rem; }
    .mes-header-count { font-size: 0.78rem; opacity: 0.8; }
    .mes-header-toggle { font-size: 1.1rem; transition: transform 0.3s; }
    .mes-bloque.collapsed .mes-header-toggle { transform: rotate(-90deg); }
    .mes-body { max-height: 2000px; overflow: hidden; transition: max-height 0.4s ease; }
    .mes-bloque.collapsed .mes-body { max-height: 0; }

    /* Tabla de estancias */
    .estancias-table { width: 100%; border-collapse: collapse; }
    .estancias-table th {
      padding: 8px 12px; text-align: left; font-size: 0.7rem; font-weight: 700;
      color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.3px;
      background: var(--cream-medium); border-bottom: 1px solid var(--cream-dark);
    }
    .estancias-table td {
      padding: 10px 12px; border-bottom: 1px solid var(--cream-dark); font-size: 0.85rem; vertical-align: middle;
    }
    .estancias-table tr { cursor: pointer; transition: background 0.15s; }
    .estancias-table tr:hover { background: var(--cream-medium); }
    .estancias-table tr:last-child td { border-bottom: none; }

    .est-nombre { font-weight: 600; }
    .est-tipo-badge {
      display: inline-block; padding: 2px 8px; border-radius: var(--radius-full);
      font-size: 0.72rem; font-weight: 600; white-space: nowrap;
    }
    .est-tipo-badge.familiar { background: var(--sage-muted); color: var(--sage-dark); }
    .est-tipo-badge.evento { background: rgba(91,155,213,0.15); color: #3B7CC5; }
    .est-tipo-badge.otros { background: rgba(232,168,124,0.15); color: #B87A4A; }
    .est-fecha { white-space: nowrap; font-size: 0.82rem; }
    .est-hora { color: var(--text-muted); font-size: 0.75rem; }
    .est-pax { font-family: 'Quicksand'; font-weight: 700; font-size: 0.88rem; color: var(--mayordomo); white-space: nowrap; }
    .est-pax-detail { font-size: 0.7rem; color: var(--text-muted); font-family: 'Nunito'; font-weight: 400; }
    .est-estado {
      display: inline-block; padding: 2px 8px; border-radius: var(--radius-full);
      font-size: 0.68rem; font-weight: 600;
    }
    .est-estado.borrador { background: var(--cream-dark); color: var(--text-light); }
    .est-estado.pendiente { background: #FEF3C7; color: #92400E; }
    .est-estado.enviado { background: var(--sage); color: white; }

    .mes-empty { padding: 20px; text-align: center; color: var(--text-muted); font-size: 0.85rem; }
    .tabla-empty { text-align: center; padding: 50px 20px; color: var(--text-muted); }
    .tabla-empty-icon { font-size: 2.5rem; opacity: 0.3; margin-bottom: 8px; }

    .btn-pdf {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 14px; background: white; color: #5C7D5F;
      border: 2px solid #7A9E7E; border-radius: 8px;
      font-family: 'Nunito', sans-serif; font-size: 0.82rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-pdf:hover { background: #7A9E7E; color: white; }

    @media (max-width: 600px) {
      .header { padding: 12px 16px; }
      .main { padding: 12px; }
      .estancias-table th, .estancias-table td { padding: 8px 8px; font-size: 0.78rem; }
      .stats-row { flex-wrap: wrap; }
      .stat-pill { min-width: 80px; }
      /* Hide hora and estado columns on mobile */
      .estancias-table th:nth-child(5), .estancias-table td:nth-child(5) { display: none; }
    }
  </style>
</head>
<body>
  <header class="header" id="page-header">
    <div class="header-left">
      <a href="#" class="back-btn" id="btn-volver">← Volver</a>
      <div class="header-title">
        <div class="header-icon">📅</div>
        <div class="header-info">
          <h1>Estancias</h1>
          <p id="bien-nombre">Cargando...</p>
        </div>
      </div>
    </div>
    <div class="header-actions">
      <button class="btn-pdf" onclick="generarPDF()">📄 PDF</button>
      <div class="dropdown-nueva">
        <button class="dropdown-toggle" onclick="toggleDropdown()">+ Nueva ▾</button>
        <div class="dropdown-menu" id="dropdown-menu">
          <div class="dropdown-item" onclick="nuevaEstanciaTipo('familiar')"><div class="dropdown-item-color familiar"></div><span>🏠 Estancia Familiar</span></div>
          <div class="dropdown-item" onclick="nuevaEstanciaTipo('nietos_amigos')"><div class="dropdown-item-color nietos_amigos"></div><span>👶 Nietos con amigos</span></div>
          <div class="dropdown-item" onclick="nuevaEstanciaTipo('finde_asignado')"><div class="dropdown-item-color finde_asignado"></div><span>📅 Finde asignado</span></div>
          <div class="dropdown-separator"></div>
          <div class="dropdown-item" onclick="nuevaEstanciaTipo('evento')"><div class="dropdown-item-color evento"></div><span>🎉 Evento</span></div>
          <div class="dropdown-item" onclick="nuevaEstanciaTipo('otros')"><div class="dropdown-item-color otros"></div><span>📌 Otros</span></div>
        </div>
      </div>
    </div>
  </header>

  <main class="main">
    <div class="loading" id="loading"><div class="spinner"></div></div>

    <div class="hidden" id="content">
      <!-- Leyenda compacta -->
      <div class="leyenda-bar">
        <div class="leyenda-chip"><div class="leyenda-dot familiar"></div> Familiar</div>
        <div class="leyenda-chip"><div class="leyenda-dot evento"></div> Evento</div>
        <div class="leyenda-chip"><div class="leyenda-dot otros"></div> Otros</div>
        <div class="leyenda-chip"><div class="leyenda-dot borrador"></div> Borrador</div>
      </div>

      <!-- Stats -->
      <div class="stats-row" id="stats-row"></div>

      <!-- Tabla por meses -->
      <div id="meses-container"></div>
    </div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="permisos-familia.js"></script>
  <script>
    let currentUser = null;
    let bienId = null;
    let bienData = null;
    let origen = 'mayordomo';
    let estancias = [];

    const MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

    // Init
    const params = new URLSearchParams(window.location.search);
    bienId = params.get('id');
    origen = params.get('origen') || 'mayordomo';

    if (!bienId) {
      alert('No se especificó el bien');
      window.location.href = 'lo-comun.html';
    }

    document.getElementById('btn-volver').href = `bien.html?id=${bienId}`;

    auth.onAuthStateChanged(async (user) => {
      if (!user) { window.location.href = 'login.html'; return; }
      currentUser = user;

      try {
        if (typeof PermisosFamilia !== 'undefined') {
          await PermisosFamilia.init(db, user, bienId);
          if (!PermisosFamilia.puedeVer()) {
            document.getElementById('loading').classList.add('hidden');
            document.querySelector('main').innerHTML = '<div style="text-align:center;padding:60px 20px;"><div style="font-size:3rem;opacity:0.3;">🔒</div><h2 style="font-family:Quicksand,sans-serif;">Sin acceso</h2><p style="color:#9A9A9A;">No tienes permisos para ver estancias.</p></div>';
            return;
          }
        }
      } catch (e) { console.log('PermisosFamilia:', e.message); }

      await cargarDatos();

      try {
        if (typeof PermisosFamilia !== 'undefined') PermisosFamilia.aplicarUI();
      } catch (e) { console.log('PermisosFamilia UI:', e.message); }
    });

    async function cargarDatos() {
      try {
        const bienDoc = await db.collection('bienes').doc(bienId).get();
        if (!bienDoc.exists) {
          alert('Bien no encontrado');
          window.location.href = 'lo-comun.html';
          return;
        }
        bienData = { id: bienDoc.id, ...bienDoc.data() };
        document.getElementById('bien-nombre').textContent = bienData.nombre;

        const header = document.getElementById('page-header');
        if (bienData.gerenteActivo) header.classList.add('gerente');
        else if (bienData.capatazActivo) header.classList.add('capataz');

        document.getElementById('loading').classList.add('hidden');
        document.getElementById('content').classList.remove('hidden');

        await cargarEstancias();
      } catch (e) {
        console.error('Error cargando datos:', e);
        alert('Error al cargar datos');
      }
    }

    async function cargarEstancias() {
      try {
        let todas = [];
        const idsVistos = new Set();

        // 1. Colección 'reservas'
        try {
          const snap = await db.collection('bienes').doc(bienId).collection('reservas').get();
          const reservas = snap.docs.map(d => ({ id: d.id, src: 'reservas', ...d.data() }))
            .filter(r => { const a = r.addonActivo; return !a || a === 'mayordomo'; });
          reservas.forEach(r => idsVistos.add(r.id));
          todas = todas.concat(reservas);
        } catch (e) { console.warn('Error leyendo reservas:', e); }

        // 2. Colección 'estancias' (legacy)
        try {
          const snap2 = await db.collection('bienes').doc(bienId).collection('estancias').get();
          const est = snap2.docs.map(d => ({ id: d.id, src: 'estancias', ...d.data() }))
            .filter(r => { if (idsVistos.has(r.id)) return false; const a = r.addonActivo; return !a || a === 'mayordomo'; });
          todas = todas.concat(est);
        } catch (e) { console.warn('Error leyendo estancias:', e); }

        todas.sort((a, b) => (toFechaStr(a.fechaInicio) || '').localeCompare(toFechaStr(b.fechaInicio) || ''));
        estancias = todas;

        renderStats();
        renderMeses();
      } catch (e) {
        console.error('Error cargando:', e);
        estancias = [];
      }
    }

    // ========== HELPERS ==========
    function toFechaStr(val) {
      if (!val) return '';
      if (typeof val === 'string') return val;
      if (val.toDate) val = val.toDate();
      return `${val.getFullYear()}-${String(val.getMonth() + 1).padStart(2, '0')}-${String(val.getDate()).padStart(2, '0')}`;
    }

    function formatFechaCorta(fechaStr) {
      if (!fechaStr) return '—';
      const d = new Date(fechaStr + 'T12:00:00');
      return d.toLocaleDateString('es-ES', { day: 'numeric', month: 'short' });
    }

    function getTipoEstancia(e) {
      const sub = e.subtipoEstancia || '';
      if (sub === 'nietos_amigos' || sub === 'finde_asignado' || sub === 'familiar') return 'familiar';
      if (e.tipoEstancia) {
        if (e.tipoEstancia === 'nietos_amigos' || e.tipoEstancia === 'finde_asignado') return 'familiar';
        return e.tipoEstancia;
      }
      const tid = e.tipoId || e.tipo || '';
      if (tid.includes('familiar') || tid.includes('estancia') || tid.includes('nietos') || tid.includes('finde')) return 'familiar';
      if (tid.includes('evento')) return 'evento';
      if (e.esFamiliar === true) return 'familiar';
      if (e.tipoReserva === 'evento' || e.tipo === 'evento') return 'evento';
      return 'familiar';
    }

    function getSubtipoEstancia(e) {
      if (e.subtipoEstancia) return e.subtipoEstancia;
      if (e.tipoEstancia === 'nietos_amigos' || e.tipoEstancia === 'finde_asignado') return e.tipoEstancia;
      const tipo = getTipoEstancia(e);
      if (tipo === 'evento') return 'evento';
      if (tipo === 'otros') return 'otros';
      return 'familiar';
    }

    function getSubtipoIcon(e) {
      const sub = getSubtipoEstancia(e);
      switch(sub) {
        case 'nietos_amigos': return '👶';
        case 'finde_asignado': return '📅';
        case 'evento': return '🎉';
        case 'otros': return '📌';
        default: return '🏠';
      }
    }

    function getSubtipoLabel(e) {
      const sub = getSubtipoEstancia(e);
      switch(sub) {
        case 'nietos_amigos': return 'Nietos con amigos';
        case 'finde_asignado': return 'Finde asignado';
        case 'evento': return 'Evento';
        case 'otros': return 'Otros';
        default: return 'Familiar';
      }
    }

    function getEstadoInfo(e) {
      const raw = e.estado || 'borrador';
      if (raw === 'confirmada' || raw === 'aprobada') return { css: 'enviado', label: 'Confirmado' };
      if (raw === 'pendiente') return { css: 'pendiente', label: 'Pendiente' };
      if (raw === 'enviado') return { css: 'enviado', label: 'Enviado' };
      return { css: 'borrador', label: 'Borrador' };
    }

    // ========== PAX CALCULATION ==========
    function calcularPax(e) {
      const prep = e.preparacion || {};
      const personas = prep.personas || e.personas || {};
      const dias = Object.values(personas);

      if (dias.length === 0) {
        // Fallback: numPersonas o campo simple
        const total = e.numPersonas || e.personas_total || 0;
        return total > 0 ? { total, fam: total, inv: 0 } : null;
      }

      let maxFam = 0;
      let maxTotal = 0;

      dias.forEach(d => {
        if (typeof d !== 'object') return;
        const fam = d.familiares || 0;
        const pases = [d.desayuno || 0, d.comida || 0, d.cena || 0, d.duermen || 0];
        const maxPase = Math.max(...pases, fam);

        if (fam > maxFam) maxFam = fam;
        if (maxPase > maxTotal) maxTotal = maxPase;
      });

      if (maxTotal === 0 && maxFam === 0) return null;
      const inv = Math.max(0, maxTotal - maxFam);
      return { total: maxTotal, fam: maxFam, inv };
    }

    // ========== RENDER ==========
    function renderStats() {
      const hoy = new Date().toISOString().split('T')[0];
      const proximas = estancias.filter(e => toFechaStr(e.fechaFin) >= hoy).length;
      const borradores = estancias.filter(e => (e.estado || 'borrador') === 'borrador').length;
      const confirmadas = estancias.filter(e => ['confirmada', 'aprobada', 'enviado'].includes(e.estado)).length;

      document.getElementById('stats-row').innerHTML = `
        <div class="stat-pill"><div class="stat-num">${estancias.length}</div><div class="stat-label">Total</div></div>
        <div class="stat-pill"><div class="stat-num">${proximas}</div><div class="stat-label">Próximas</div></div>
        <div class="stat-pill"><div class="stat-num">${confirmadas}</div><div class="stat-label">Confirmadas</div></div>
        <div class="stat-pill"><div class="stat-num">${borradores}</div><div class="stat-label">Borradores</div></div>
      `;
    }

    function renderMeses() {
      const container = document.getElementById('meses-container');

      if (estancias.length === 0) {
        container.innerHTML = '<div class="tabla-empty"><div class="tabla-empty-icon">📅</div><div style="font-weight:600;">Sin estancias</div><div style="font-size:0.85rem;">Crea la primera estancia con el botón + Nueva</div></div>';
        return;
      }

      // Agrupar por mes
      const porMes = {};
      estancias.forEach(e => {
        const fecha = toFechaStr(e.fechaInicio);
        if (!fecha) return;
        const key = fecha.substring(0, 7); // YYYY-MM
        if (!porMes[key]) porMes[key] = [];
        porMes[key].push(e);
      });

      // Ordenar meses
      const mesesOrdenados = Object.keys(porMes).sort();

      // Mes actual
      const hoy = new Date();
      const mesActualKey = `${hoy.getFullYear()}-${String(hoy.getMonth() + 1).padStart(2, '0')}`;

      container.innerHTML = mesesOrdenados.map(mesKey => {
        const [year, month] = mesKey.split('-');
        const mesLabel = `${MESES[parseInt(month) - 1]} ${year}`;
        const items = porMes[mesKey];
        const collapsed = mesKey !== mesActualKey ? 'collapsed' : '';

        const filasHtml = items.map(e => {
          const tipo = getTipoEstancia(e);
          const icon = getSubtipoIcon(e);
          const subLabel = getSubtipoLabel(e);
          const nombre = e.titulo || e.nombre || e.tipoReservaNombre || 'Estancia';
          const estadoInfo = getEstadoInfo(e);
          const fi = toFechaStr(e.fechaInicio);
          const ff = toFechaStr(e.fechaFin);
          const horaE = e.horaLlegada || '';
          const horaS = e.horaSalida || '';

          const pax = calcularPax(e);
          let paxHtml = '<span style="color:var(--text-muted);">—</span>';
          if (pax) {
            paxHtml = `<span class="est-pax">${pax.total}</span>`;
            if (pax.fam > 0 || pax.inv > 0) {
              paxHtml += `<br><span class="est-pax-detail">${pax.fam} fam${pax.inv > 0 ? ' + ' + pax.inv + ' inv' : ''}</span>`;
            }
          }

          return `<tr onclick="editarEstancia('${e.id}','${e.src || 'estancias'}')">
            <td><span class="est-nombre">${icon} ${nombre}</span></td>
            <td><span class="est-tipo-badge ${tipo}">${subLabel}</span></td>
            <td class="est-fecha">${formatFechaCorta(fi)}${horaE ? `<br><span class="est-hora">${horaE}</span>` : ''}</td>
            <td class="est-fecha">${formatFechaCorta(ff)}${horaS ? `<br><span class="est-hora">${horaS}</span>` : ''}</td>
            <td><span class="est-estado ${estadoInfo.css}">${estadoInfo.label}</span></td>
            <td>${paxHtml}</td>
          </tr>`;
        }).join('');

        return `<div class="mes-bloque ${collapsed}" id="mes-${mesKey}">
          <div class="mes-header" onclick="toggleMes('${mesKey}')">
            <div class="mes-header-left">
              <span class="mes-header-titulo">📅 ${mesLabel}</span>
              <span class="mes-header-count">(${items.length} estancia${items.length !== 1 ? 's' : ''})</span>
            </div>
            <span class="mes-header-toggle">▼</span>
          </div>
          <div class="mes-body">
            <table class="estancias-table">
              <thead>
                <tr>
                  <th>Nombre</th>
                  <th>Tipo</th>
                  <th>Entrada</th>
                  <th>Salida</th>
                  <th>Estado</th>
                  <th>Pax</th>
                </tr>
              </thead>
              <tbody>${filasHtml}</tbody>
            </table>
          </div>
        </div>`;
      }).join('');
    }

    function toggleMes(mesKey) {
      document.getElementById(`mes-${mesKey}`).classList.toggle('collapsed');
    }

    // ========== ACCIONES ==========
    function toggleDropdown() {
      document.getElementById('dropdown-menu').classList.toggle('open');
    }
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.dropdown-nueva')) {
        document.getElementById('dropdown-menu').classList.remove('open');
      }
    });

    function nuevaEstanciaTipo(tipo) {
      document.getElementById('dropdown-menu').classList.remove('open');
      if (tipo === 'otros') {
        window.location.href = `estancia-simple.html?bienId=${bienId}&tipo=otros`;
      } else if (tipo === 'nietos_amigos' || tipo === 'finde_asignado') {
        window.location.href = `estancia-form.html?bienId=${bienId}&tipo=familiar&subtipo=${tipo}`;
      } else {
        window.location.href = `estancia-form.html?bienId=${bienId}&tipo=${tipo}`;
      }
    }

    function editarEstancia(id, src) {
      const e = estancias.find(x => x.id === id);
      if (!e) return;
      const tipo = getTipoEstancia(e);
      if (tipo === 'otros') {
        window.location.href = `estancia-simple.html?bienId=${bienId}&id=${id}&src=${src}`;
      } else {
        window.location.href = `estancia-form.html?bienId=${bienId}&id=${id}&src=${src}`;
      }
    }

    // ========== PDF ==========
    function generarPDF() {
      if (typeof html2pdf === 'undefined') { alert('PDF cargando, intenta de nuevo.'); return; }
      const bienNombre = bienData?.nombre || 'Bien';
      const fechaHoy = new Date().toLocaleDateString('es-ES', { day: 'numeric', month: 'long', year: 'numeric' });

      let tablaHtml = '';
      const porMes = {};
      estancias.forEach(e => {
        const f = toFechaStr(e.fechaInicio);
        if (!f) return;
        const k = f.substring(0, 7);
        if (!porMes[k]) porMes[k] = [];
        porMes[k].push(e);
      });

      Object.keys(porMes).sort().forEach(mesKey => {
        const [y, m] = mesKey.split('-');
        const mesLabel = `${MESES[parseInt(m) - 1]} ${y}`;
        tablaHtml += `<tr style="background:#8B7355;color:white;"><td colspan="6" style="padding:8px 10px;font-weight:700;font-size:11px;">${mesLabel} (${porMes[mesKey].length})</td></tr>`;

        porMes[mesKey].forEach(e => {
          const nombre = e.titulo || e.nombre || e.tipoReservaNombre || 'Estancia';
          const subLabel = getSubtipoLabel(e);
          const fi = formatFechaCorta(toFechaStr(e.fechaInicio));
          const ff = formatFechaCorta(toFechaStr(e.fechaFin));
          const horaE = e.horaLlegada || '';
          const horaS = e.horaSalida || '';
          const estadoInfo = getEstadoInfo(e);
          const pax = calcularPax(e);
          const paxStr = pax ? `${pax.total} (${pax.fam}f + ${pax.inv}i)` : '—';

          tablaHtml += `<tr>
            <td style="padding:5px 8px;font-size:10px;font-weight:600;">${nombre}</td>
            <td style="padding:5px 8px;font-size:10px;">${subLabel}</td>
            <td style="padding:5px 8px;font-size:10px;white-space:nowrap;">${fi} ${horaE}</td>
            <td style="padding:5px 8px;font-size:10px;white-space:nowrap;">${ff} ${horaS}</td>
            <td style="padding:5px 8px;font-size:10px;">${estadoInfo.label}</td>
            <td style="padding:5px 8px;font-size:10px;font-weight:600;">${paxStr}</td>
          </tr>`;
        });
      });

      const div = document.createElement('div');
      div.innerHTML = `
        <div style="font-family:'Nunito',Helvetica,sans-serif;padding:14px;max-width:700px;">
          <div style="text-align:center;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid #8B7355;">
            <div style="font-family:'Quicksand',sans-serif;font-size:16px;font-weight:700;color:#8B7355;">FAMILYNK</div>
            <div style="font-size:12px;font-weight:600;color:#3D3D3D;">Estancias · ${bienNombre}</div>
            <div style="font-size:9px;color:#9A9A9A;">${fechaHoy}</div>
          </div>
          <div style="margin-bottom:10px;font-size:11px;color:#6B6B6B;">Total: <b>${estancias.length}</b> estancias</div>
          <table style="width:100%;border-collapse:collapse;">
            <thead>
              <tr style="background:#F5EDE4;">
                <th style="padding:5px 8px;text-align:left;font-size:9px;">NOMBRE</th>
                <th style="padding:5px 8px;text-align:left;font-size:9px;">TIPO</th>
                <th style="padding:5px 8px;text-align:left;font-size:9px;">ENTRADA</th>
                <th style="padding:5px 8px;text-align:left;font-size:9px;">SALIDA</th>
                <th style="padding:5px 8px;text-align:left;font-size:9px;">ESTADO</th>
                <th style="padding:5px 8px;text-align:left;font-size:9px;">PAX</th>
              </tr>
            </thead>
            <tbody>${tablaHtml}</tbody>
          </table>
          <div style="margin-top:16px;padding-top:8px;border-top:1px solid #eee;font-size:9px;color:#9A9A9A;text-align:center;">Generado: ${fechaHoy} · FAMILYNK</div>
        </div>
      `;
      document.body.appendChild(div);

      html2pdf().set({
        margin: [6, 6, 6, 6],
        filename: 'Estancias_' + bienNombre.replace(/[^a-zA-Z0-9áéíóúñ ]/gi, '').trim().replace(/ +/g, '-') + '_' + new Date().toISOString().slice(0, 10) + '.pdf',
        html2canvas: { scale: 2 },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' }
      }).from(div).save().then(() => document.body.removeChild(div));
    }
  </script>
</body>
</html>
