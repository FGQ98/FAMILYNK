<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2D4A5C">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FAMILYNK — Distribuir Habitaciones</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --gerente: #2D4A5C;
      --gerente-light: #4A6B7C;
      --gerente-dark: #1D3544;
      --gerente-muted: rgba(45, 74, 92, 0.15);
      --sage: #7A9E7E;
      --cream: #FDF8F3;
      --cream-dark: #F5EDE4;
      --text: #3D3D3D;
      --text-light: #6B6B6B;
      --text-muted: #999;
      --white: #FFFFFF;
      --border: #E8E0D8;
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
      --shadow-float: 0 8px 24px rgba(0,0,0,0.12);
      --radius: 12px;
      --danger: #D32F2F;
      --warning: #F9A825;
      --success: #2E7D32;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Nunito', sans-serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100vh;
    }

    /* ========== HEADER ========== */
    .header {
      background: linear-gradient(135deg, var(--gerente) 0%, var(--gerente-dark) 100%);
      color: white;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow);
    }
    .header-back {
      background: rgba(255,255,255,0.15);
      border: none;
      color: white;
      width: 36px; height: 36px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      transition: background 0.2s;
    }
    .header-back:hover { background: rgba(255,255,255,0.25); }
    .header-title {
      font-family: 'Quicksand', sans-serif;
      font-weight: 700;
      font-size: 1.15rem;
      flex: 1;
    }
    .header-actions { display: flex; gap: 8px; }
    .header-btn {
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
      padding: 8px 16px;
      border-radius: 8px;
      font-family: 'Nunito', sans-serif;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .header-btn:hover { background: rgba(255,255,255,0.3); }
    .header-btn.save {
      background: var(--success);
      border-color: var(--success);
    }
    .header-btn.save:hover { background: #256d29; }

    /* ========== RESERVA INFO ========== */
    .reserva-info {
      background: var(--white);
      margin: 16px;
      padding: 16px 20px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border-left: 4px solid var(--gerente);
    }
    .reserva-info-title {
      font-family: 'Quicksand', sans-serif;
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--gerente);
      margin-bottom: 8px;
    }
    .reserva-info-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      font-size: 0.9rem;
      color: var(--text-light);
    }
    .reserva-info-meta span { display: flex; align-items: center; gap: 4px; }

    /* ========== STATS BAR ========== */
    .stats-bar {
      display: flex;
      gap: 8px;
      margin: 0 16px 16px;
      flex-wrap: wrap;
    }
    .stat-chip {
      background: var(--white);
      padding: 8px 14px;
      border-radius: 20px;
      font-size: 0.82rem;
      font-weight: 600;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .stat-chip.ok { color: var(--success); }
    .stat-chip.warning { color: var(--warning); }
    .stat-chip.danger { color: var(--danger); }

    /* ========== MAIN CONTENT ========== */
    .content { padding: 0 16px 100px; }

    /* ========== ROOM CARDS ========== */
    .room-card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: 12px;
      overflow: hidden;
      transition: box-shadow 0.2s;
    }
    .room-card.dragover {
      box-shadow: 0 0 0 2px var(--gerente), var(--shadow-float);
    }
    .room-header {
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      user-select: none;
    }
    .room-icon {
      width: 42px; height: 42px;
      background: var(--gerente-muted);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      flex-shrink: 0;
    }
    .room-info { flex: 1; min-width: 0; }
    .room-name {
      font-family: 'Quicksand', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      color: var(--text);
    }
    .room-meta {
      font-size: 0.8rem;
      color: var(--text-muted);
      display: flex;
      gap: 12px;
      margin-top: 2px;
    }
    .room-capacity-badge {
      font-size: 0.75rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 12px;
      white-space: nowrap;
    }
    .room-capacity-badge.libre {
      background: rgba(46, 125, 50, 0.1);
      color: var(--success);
    }
    .room-capacity-badge.parcial {
      background: rgba(249, 168, 37, 0.1);
      color: var(--warning);
    }
    .room-capacity-badge.llena {
      background: rgba(211, 47, 47, 0.1);
      color: var(--danger);
    }

    .room-body {
      padding: 0 16px 14px;
      border-top: 1px solid var(--border);
    }

    /* Huéspedes asignados dentro de la room */
    .assigned-guest {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px dashed var(--border);
    }
    .assigned-guest:last-child { border-bottom: none; }
    .guest-avatar {
      width: 34px; height: 34px;
      background: var(--gerente-muted);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      flex-shrink: 0;
      font-weight: 700;
      color: var(--gerente);
    }
    .guest-details { flex: 1; min-width: 0; }
    .guest-name {
      font-weight: 700;
      font-size: 0.9rem;
      color: var(--text);
    }
    .guest-tipo {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      font-weight: 600;
    }
    .guest-notas {
      font-size: 0.82rem;
      color: var(--gerente);
      margin-top: 4px;
      background: var(--gerente-muted);
      padding: 6px 10px;
      border-radius: 8px;
      line-height: 1.4;
    }
    .guest-notas-reserva {
      margin-top: 4px;
    }
    .guest-notas-reserva input {
      width: 100%;
      border: 1px dashed var(--border);
      border-radius: 6px;
      padding: 6px 10px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.82rem;
      color: var(--text);
      background: var(--cream);
      transition: border-color 0.2s;
    }
    .guest-notas-reserva input:focus {
      outline: none;
      border-color: var(--gerente);
      background: var(--white);
    }
    .guest-notas-reserva input::placeholder { color: var(--text-muted); }
    .guest-remove {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 1.1rem;
      padding: 4px;
      transition: color 0.2s;
      flex-shrink: 0;
    }
    .guest-remove:hover { color: var(--danger); }

    /* Botón añadir huésped */
    .add-guest-btn {
      width: 100%;
      padding: 10px;
      border: 2px dashed var(--border);
      border-radius: 8px;
      background: var(--cream);
      color: var(--text-light);
      font-family: 'Nunito', sans-serif;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      margin-top: 8px;
      transition: all 0.2s;
    }
    .add-guest-btn:hover {
      border-color: var(--gerente);
      color: var(--gerente);
      background: var(--gerente-muted);
    }
    .add-guest-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* ========== SELECTOR DE HUÉSPED (dropdown) ========== */
    .guest-selector {
      margin-top: 8px;
      background: var(--white);
      border: 2px solid var(--gerente);
      border-radius: 8px;
      overflow: hidden;
      animation: slideDown 0.15s ease;
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .guest-selector-header {
      padding: 8px 12px;
      background: var(--gerente-muted);
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--gerente);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .guest-selector-close {
      background: none;
      border: none;
      font-size: 1.1rem;
      cursor: pointer;
      color: var(--gerente);
    }
    .guest-selector-list {
      max-height: 200px;
      overflow-y: auto;
    }
    .guest-selector-item {
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: background 0.15s;
      border-bottom: 1px solid var(--border);
    }
    .guest-selector-item:last-child { border-bottom: none; }
    .guest-selector-item:hover { background: var(--gerente-muted); }
    .guest-selector-item .gs-name {
      font-weight: 600;
      font-size: 0.9rem;
    }
    .guest-selector-item .gs-notas {
      font-size: 0.78rem;
      color: var(--text-light);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .guest-selector-empty {
      padding: 16px;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    /* ========== POOL DE HUÉSPEDES SIN ASIGNAR ========== */
    .pool-section {
      margin-top: 20px;
    }
    .pool-title {
      font-family: 'Quicksand', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      color: var(--text-light);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .pool-count {
      background: var(--warning);
      color: white;
      font-size: 0.72rem;
      padding: 2px 8px;
      border-radius: 10px;
    }
    .pool-guest {
      background: var(--white);
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 8px;
      box-shadow: var(--shadow);
      display: flex;
      align-items: flex-start;
      gap: 10px;
      cursor: grab;
      transition: all 0.2s;
      border-left: 3px solid var(--warning);
    }
    .pool-guest:hover {
      box-shadow: var(--shadow-float);
      transform: translateY(-1px);
    }
    .pool-guest.dragging { opacity: 0.5; }

    /* ========== EMPTY STATE ========== */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
    }
    .empty-state-icon { font-size: 3rem; margin-bottom: 12px; }
    .empty-state-title {
      font-family: 'Quicksand', sans-serif;
      font-weight: 700;
      font-size: 1.1rem;
      margin-bottom: 8px;
    }
    .empty-state-text { color: var(--text-light); font-size: 0.9rem; }

    /* ========== LOADING ========== */
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-light);
    }
    .loading-spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--gerente);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ========== TOAST ========== */
    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--gerente-dark);
      color: white;
      padding: 12px 24px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 0.9rem;
      z-index: 1000;
      opacity: 0;
      transition: all 0.3s ease;
      box-shadow: var(--shadow-float);
    }
    .toast.visible {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* ========== RESPONSIVE ========== */
    @media (max-width: 480px) {
      .header-title { font-size: 1rem; }
      .reserva-info-meta { gap: 8px; flex-direction: column; }
      .stats-bar { flex-direction: column; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <button class="header-back" onclick="volver()" title="Volver">←</button>
    <div class="header-title">🛏️ Distribuir Habitaciones</div>
    <div class="header-actions">
      <button class="header-btn save" onclick="guardarDistribucion()">💾 Guardar</button>
    </div>
  </header>

  <!-- RESERVA INFO -->
  <div class="reserva-info" id="reserva-info">
    <div class="reserva-info-title" id="reserva-nombre">Cargando reserva...</div>
    <div class="reserva-info-meta" id="reserva-meta"></div>
  </div>

  <!-- STATS BAR -->
  <div class="stats-bar" id="stats-bar"></div>

  <!-- LOADING -->
  <div class="loading" id="loading">
    <div class="loading-spinner"></div>
    Cargando habitaciones y huéspedes...
  </div>

  <!-- CONTENT -->
  <div class="content" id="content" style="display:none;">
    <div id="rooms-list"></div>
    <div class="pool-section" id="pool-section" style="display:none;">
      <div class="pool-title">
        👥 Sin asignar <span class="pool-count" id="pool-count">0</span>
      </div>
      <div id="pool-list"></div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script>
    const auth = firebase.auth();
    const db = firebase.firestore();

    const params = new URLSearchParams(window.location.search);
    const bienId = params.get('id');
    const reservaId = params.get('reservaId');

    let currentUser = null;
    let reservaData = null;
    let zonasData = [];       // solo dormitorios
    let huespedesData = [];   // todos los del bien
    let distribucion = {};    // { zonaId: [{ huespedId, notasReserva }] }
    let selectorAbierto = null;

    // ========== AUTH ==========
    auth.onAuthStateChanged(async user => {
      if (!user) { window.location.href = 'index.html'; return; }
      if (!bienId || !reservaId) {
        alert('Faltan parámetros (id del bien o reservaId)');
        window.history.back();
        return;
      }
      currentUser = user;
      await cargarTodo();
    });

    // ========== CARGA DE DATOS ==========
    async function cargarTodo() {
      try {
        const bienRef = db.collection('bienes').doc(bienId);

        // 1. Reserva
        const reservaDoc = await bienRef.collection('reservas').doc(reservaId).get();
        if (!reservaDoc.exists) {
          alert('Reserva no encontrada');
          window.history.back();
          return;
        }
        reservaData = { id: reservaDoc.id, ...reservaDoc.data() };

        // 2. Zonas (solo dormitorios)
        const zonasSnap = await bienRef.collection('zonas')
          .where('tipo', '==', 'dormitorio')
          .orderBy('orden')
          .get();

        zonasData = [];
        for (const doc of zonasSnap.docs) {
          const zona = { id: doc.id, ...doc.data(), dependencias: [] };
          // Cargar dependencias
          const depsSnap = await bienRef.collection('zonas').doc(doc.id)
            .collection('dependencias').get();
          zona.dependencias = depsSnap.docs.map(d => ({ id: d.id, ...d.data() }));
          // Capacidad total = suma de dependencias o campo propio
          if (!zona.capacidad && zona.dependencias.length > 0) {
            zona.capacidad = zona.dependencias.reduce((sum, d) => sum + (d.capacidad || 0), 0);
          }
          zonasData.push(zona);
        }

        // Si no hay zonas con tipo dormitorio, intentar sin filtro tipo
        if (zonasData.length === 0) {
          const zonasAllSnap = await bienRef.collection('zonas').get();
          zonasAllSnap.docs.forEach(doc => {
            const d = doc.data();
            if (d.tipo === 'dormitorio' || d.tipo === 'alojamiento') {
              zonasData.push({ id: doc.id, ...d, dependencias: [] });
            }
          });
        }

        // 3. Huéspedes
        const huespSnap = await bienRef.collection('huespedes').get();
        huespedesData = huespSnap.docs.map(d => ({ id: d.id, ...d.data() }));

        // 4. Distribución existente (si ya se guardó antes)
        distribucion = {};
        if (reservaData.distribucion) {
          // Formato: { zonaId: [{ huespedId, notasReserva }] }
          distribucion = JSON.parse(JSON.stringify(reservaData.distribucion));
        }

        renderReservaInfo();
        renderRooms();
        renderPool();
        renderStats();

        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').style.display = 'block';

      } catch (error) {
        console.error('Error cargando datos:', error);
        document.getElementById('loading').innerHTML =
          '<div style="color:var(--danger)">❌ Error al cargar datos</div>';
      }
    }

    // ========== RENDER RESERVA INFO ==========
    function renderReservaInfo() {
      const r = reservaData;
      document.getElementById('reserva-nombre').textContent =
        r.nombre || r.titular || 'Reserva sin nombre';

      const fechaI = r.fechaInicio?.toDate ? r.fechaInicio.toDate() : new Date(r.fechaInicio);
      const fechaF = r.fechaFin?.toDate ? r.fechaFin.toDate() : new Date(r.fechaFin);
      const opts = { day: 'numeric', month: 'short' };

      let estadoEmoji = '⏳';
      if (r.estado === 'confirmada' || r.estado === 'aprobada') estadoEmoji = '✅';
      else if (r.estado === 'checkin') estadoEmoji = '🏨';
      else if (r.estado === 'cancelada') estadoEmoji = '❌';

      document.getElementById('reserva-meta').innerHTML = `
        <span>📅 ${fechaI.toLocaleDateString('es-ES', opts)} — ${fechaF.toLocaleDateString('es-ES', opts)}</span>
        <span>${estadoEmoji} ${(r.estado || 'pendiente').charAt(0).toUpperCase() + (r.estado || 'pendiente').slice(1)}</span>
        <span>👥 ${huespedesData.length} huéspedes registrados</span>
      `;
    }

    // ========== RENDER STATS ==========
    function renderStats() {
      const totalPlazas = zonasData.reduce((s, z) => s + (z.capacidad || 2), 0);
      const totalAsignados = Object.values(distribucion)
        .reduce((s, arr) => s + arr.length, 0);
      const sinAsignar = huespedesData.length - totalAsignados;

      let asigClass = 'ok';
      if (sinAsignar > 0) asigClass = 'warning';

      let plazaClass = 'ok';
      if (totalAsignados > totalPlazas) plazaClass = 'danger';
      else if (totalAsignados < totalPlazas && sinAsignar > 0) plazaClass = 'warning';

      document.getElementById('stats-bar').innerHTML = `
        <div class="stat-chip">🛏️ ${zonasData.length} dormitorios</div>
        <div class="stat-chip ${plazaClass}">📐 ${totalAsignados}/${totalPlazas} plazas</div>
        <div class="stat-chip ${asigClass}">👥 ${sinAsignar > 0 ? sinAsignar + ' sin asignar' : 'Todos asignados ✓'}</div>
      `;
    }

    // ========== RENDER ROOMS ==========
    function renderRooms() {
      const container = document.getElementById('rooms-list');

      if (zonasData.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">🛏️</div>
            <div class="empty-state-title">Sin dormitorios configurados</div>
            <div class="empty-state-text">
              Configura zonas de tipo "Dormitorio" en el módulo Zonas antes de distribuir.
            </div>
          </div>`;
        return;
      }

      container.innerHTML = zonasData.map(zona => {
        const asignados = distribucion[zona.id] || [];
        const capacidad = zona.capacidad || 2;
        const ocupacion = asignados.length;

        let badgeClass = 'libre';
        let badgeText = `${ocupacion}/${capacidad}`;
        if (ocupacion >= capacidad) { badgeClass = 'llena'; }
        else if (ocupacion > 0) { badgeClass = 'parcial'; }

        const depsText = zona.dependencias.length > 0
          ? zona.dependencias.map(d => d.nombre).join(', ')
          : '';

        return `
          <div class="room-card" id="room-${zona.id}"
               ondragover="onDragOver(event, '${zona.id}')"
               ondragleave="onDragLeave(event, '${zona.id}')"
               ondrop="onDrop(event, '${zona.id}')">
            <div class="room-header">
              <div class="room-icon">${zona.icono || '🛏️'}</div>
              <div class="room-info">
                <div class="room-name">${zona.nombre || 'Dormitorio'}</div>
                <div class="room-meta">
                  <span>📐 ${capacidad} plazas</span>
                  ${depsText ? `<span>🚪 ${depsText}</span>` : ''}
                  ${zona.superficie ? `<span>${zona.superficie} m²</span>` : ''}
                </div>
              </div>
              <div class="room-capacity-badge ${badgeClass}">${badgeText}</div>
            </div>
            <div class="room-body">
              ${renderAsignados(zona.id, asignados)}
              <button class="add-guest-btn" id="add-btn-${zona.id}"
                      onclick="abrirSelector('${zona.id}')"
                      ${ocupacion >= capacidad ? 'disabled' : ''}>
                + Asignar huésped
              </button>
              <div id="selector-${zona.id}"></div>
            </div>
          </div>`;
      }).join('');
    }

    function renderAsignados(zonaId, asignados) {
      if (asignados.length === 0) return '';
      return asignados.map((a, idx) => {
        const huesped = huespedesData.find(h => h.id === a.huespedId);
        if (!huesped) return '';
        const iniciales = (huesped.nombre || '?').split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase();
        const tipoLabel = { titular: 'Titular', acompanante: 'Acompañante', invitado: 'Invitado' };

        return `
          <div class="assigned-guest">
            <div class="guest-avatar">${iniciales}</div>
            <div class="guest-details">
              <div class="guest-name">${huesped.nombre}</div>
              <div class="guest-tipo">${tipoLabel[huesped.tipo] || huesped.tipo || 'Huésped'}</div>
              ${huesped.notas ? `<div class="guest-notas">📋 ${huesped.notas}</div>` : ''}
              <div class="guest-notas-reserva">
                <input type="text"
                       placeholder="Nota para esta estancia (almohada, cuna...)"
                       value="${a.notasReserva || ''}"
                       onchange="actualizarNota('${zonaId}', ${idx}, this.value)">
              </div>
            </div>
            <button class="guest-remove" onclick="desasignar('${zonaId}', ${idx})" title="Quitar">✕</button>
          </div>`;
      }).join('');
    }

    // ========== RENDER POOL (sin asignar) ==========
    function renderPool() {
      const asignadosIds = new Set();
      Object.values(distribucion).forEach(arr => {
        arr.forEach(a => asignadosIds.add(a.huespedId));
      });

      const sinAsignar = huespedesData.filter(h => !asignadosIds.has(h.id));
      const poolSection = document.getElementById('pool-section');
      const poolList = document.getElementById('pool-list');
      const poolCount = document.getElementById('pool-count');

      if (sinAsignar.length === 0) {
        poolSection.style.display = 'none';
        return;
      }

      poolSection.style.display = 'block';
      poolCount.textContent = sinAsignar.length;

      poolList.innerHTML = sinAsignar.map(h => {
        const iniciales = (h.nombre || '?').split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase();
        return `
          <div class="pool-guest" draggable="true"
               ondragstart="onDragStart(event, '${h.id}')"
               ondragend="onDragEnd(event)">
            <div class="guest-avatar">${iniciales}</div>
            <div class="guest-details">
              <div class="guest-name">${h.nombre}</div>
              <div class="guest-tipo">${h.tipo || 'huésped'} ${h.pais ? '· ' + h.pais : ''}</div>
              ${h.notas ? `<div class="guest-notas">📋 ${h.notas}</div>` : ''}
            </div>
          </div>`;
      }).join('');
    }

    // ========== SELECTOR DE HUÉSPED ==========
    function abrirSelector(zonaId) {
      // Cerrar otro abierto
      if (selectorAbierto && selectorAbierto !== zonaId) {
        document.getElementById(`selector-${selectorAbierto}`).innerHTML = '';
      }
      selectorAbierto = zonaId;

      const asignadosIds = new Set();
      Object.values(distribucion).forEach(arr => {
        arr.forEach(a => asignadosIds.add(a.huespedId));
      });

      const disponibles = huespedesData.filter(h => !asignadosIds.has(h.id));
      const container = document.getElementById(`selector-${zonaId}`);

      if (disponibles.length === 0) {
        container.innerHTML = `
          <div class="guest-selector">
            <div class="guest-selector-header">
              Seleccionar huésped
              <button class="guest-selector-close" onclick="cerrarSelector('${zonaId}')">✕</button>
            </div>
            <div class="guest-selector-empty">Todos los huéspedes están asignados</div>
          </div>`;
        return;
      }

      container.innerHTML = `
        <div class="guest-selector">
          <div class="guest-selector-header">
            Seleccionar huésped (${disponibles.length} disponibles)
            <button class="guest-selector-close" onclick="cerrarSelector('${zonaId}')">✕</button>
          </div>
          <div class="guest-selector-list">
            ${disponibles.map(h => `
              <div class="guest-selector-item" onclick="asignar('${zonaId}', '${h.id}')">
                <div class="guest-avatar" style="width:28px;height:28px;font-size:0.7rem;">
                  ${(h.nombre || '?').split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase()}
                </div>
                <div style="flex:1;min-width:0;">
                  <div class="gs-name">${h.nombre}</div>
                  ${h.notas ? `<div class="gs-notas">📋 ${h.notas}</div>` : ''}
                </div>
              </div>
            `).join('')}
          </div>
        </div>`;
    }

    function cerrarSelector(zonaId) {
      document.getElementById(`selector-${zonaId}`).innerHTML = '';
      selectorAbierto = null;
    }

    // ========== ASIGNAR / DESASIGNAR ==========
    function asignar(zonaId, huespedId) {
      if (!distribucion[zonaId]) distribucion[zonaId] = [];
      distribucion[zonaId].push({ huespedId, notasReserva: '' });
      cerrarSelector(zonaId);
      renderRooms();
      renderPool();
      renderStats();
    }

    function desasignar(zonaId, idx) {
      if (distribucion[zonaId]) {
        distribucion[zonaId].splice(idx, 1);
        if (distribucion[zonaId].length === 0) delete distribucion[zonaId];
      }
      renderRooms();
      renderPool();
      renderStats();
    }

    function actualizarNota(zonaId, idx, valor) {
      if (distribucion[zonaId] && distribucion[zonaId][idx]) {
        distribucion[zonaId][idx].notasReserva = valor;
      }
    }

    // ========== DRAG & DROP ==========
    let draggingHuespedId = null;

    function onDragStart(e, huespedId) {
      draggingHuespedId = huespedId;
      e.target.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    }

    function onDragEnd(e) {
      e.target.classList.remove('dragging');
      draggingHuespedId = null;
    }

    function onDragOver(e, zonaId) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      document.getElementById(`room-${zonaId}`).classList.add('dragover');
    }

    function onDragLeave(e, zonaId) {
      document.getElementById(`room-${zonaId}`).classList.remove('dragover');
    }

    function onDrop(e, zonaId) {
      e.preventDefault();
      document.getElementById(`room-${zonaId}`).classList.remove('dragover');
      if (draggingHuespedId) {
        const zona = zonasData.find(z => z.id === zonaId);
        const asignados = distribucion[zonaId] || [];
        const capacidad = zona?.capacidad || 2;
        if (asignados.length >= capacidad) {
          mostrarToast('⚠️ Habitación llena');
          return;
        }
        asignar(zonaId, draggingHuespedId);
        draggingHuespedId = null;
      }
    }

    // ========== GUARDAR ==========
    async function guardarDistribucion() {
      try {
        await db.collection('bienes').doc(bienId)
          .collection('reservas').doc(reservaId)
          .update({ distribucion, distribucionActualizada: firebase.firestore.FieldValue.serverTimestamp() });

        mostrarToast('✅ Distribución guardada');
      } catch (error) {
        console.error('Error guardando:', error);
        mostrarToast('❌ Error al guardar');
      }
    }

    // ========== NAVEGACIÓN ==========
    function volver() {
      const origen = params.get('origen');
      if (origen === 'gerente') {
        window.location.href = `gerente.html?id=${bienId}`;
      } else {
        window.location.href = `reservas-gerente.html?id=${bienId}`;
      }
    }

    // ========== TOAST ==========
    function mostrarToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('visible');
      setTimeout(() => t.classList.remove('visible'), 2500);
    }
  </script>
</body>
</html>
