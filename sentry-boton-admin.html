<!-- CSS: pega dentro de tu <style> -->
<style>
  .sentry-card {
    background: #fff;
    border: 1px solid #e8e3dd;
    border-radius: 12px;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 16px;
  }

  .sentry-card-info {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .sentry-logo {
    width: 40px;
    height: 40px;
    background: #362d59;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .sentry-card-text h4 {
    margin: 0 0 4px 0;
    font-family: 'Quicksand', sans-serif;
    font-weight: 700;
    font-size: 15px;
    color: #2c2c2c;
  }

  .sentry-card-text p {
    margin: 0;
    font-size: 13px;
    color: #888;
  }

  .sentry-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    background: #edfaf1;
    color: #27ae60;
    border-radius: 20px;
    padding: 3px 10px;
    font-weight: 600;
    margin-top: 6px;
  }

  .sentry-badge::before {
    content: '';
    width: 7px;
    height: 7px;
    background: #27ae60;
    border-radius: 50%;
    display: inline-block;
  }

  .btn-sentry {
    background: #362d59;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 10px 20px;
    font-family: 'Quicksand', sans-serif;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
    text-decoration: none;
  }

  .btn-sentry:hover {
    background: #4a3d7a;
  }
</style>


<!-- HTML: pega donde quieras que aparezca la card en el panel -->
<div class="sentry-card">
  <div class="sentry-card-info">
    <div class="sentry-logo">🛡️</div>
    <div class="sentry-card-text">
      <h4>Monitor de Errores — Sentry</h4>
      <p>Seguimiento de errores en tiempo real de FAMILYNK</p>
      <span class="sentry-badge">Activo</span>
    </div>
  </div>
  <a href="https://familynk.sentry.io/issues/" target="_blank" class="btn-sentry">
    Ver errores ↗
  </a>
</div>
